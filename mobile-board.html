<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0f1f3d"/>
<title>Freight Board</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f4f8;min-height:100vh;padding-bottom:72px;}

/* HEADER */
.hdr{background:#0f1f3d;padding:12px 16px 0;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.3);}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.hdr-title{color:#fff;font-size:16px;font-weight:800;}
.hdr-sub{color:rgba(255,255,255,.4);font-size:10px;}
.hdr-right{display:flex;align-items:center;gap:8px;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;flex-shrink:0;}
.sync-dot.loading{background:#f59e0b;animation:pulse 1s infinite;}
.sync-dot.err{background:#ef4444;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.admin-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;}
.logout-btn{background:rgba(239,68,68,.2);border:1px solid rgba(239,68,68,.4);color:#fca5a5;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:#0f1f3d;border-top:1px solid rgba(255,255,255,.08);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom);}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px 8px;cursor:pointer;border:none;background:none;color:rgba(255,255,255,.4);font-size:9px;font-weight:700;gap:3px;}
.bnav-btn.active{color:#38bdf8;}
.bnav-icon{font-size:20px;}

/* SECTION CONTENT */
.section{display:none;padding:14px;}
.section.active{display:block;}

/* WEEK SELECTOR */
.week-scroll{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;margin-bottom:14px;}
.week-scroll::-webkit-scrollbar{display:none;}
.week-chip{background:#fff;border:1.5px solid #e2e8f0;color:#475569;padding:5px 14px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;cursor:pointer;flex-shrink:0;}
.week-chip.active{background:#0f1f3d;border-color:#0f1f3d;color:#fff;}

/* COMBINED CARD */
.ccard{background:#fff;border-radius:14px;overflow:hidden;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);border:1px solid #e2e8f0;}
.ccard-header{background:#0f1f3d;padding:10px 14px;display:flex;align-items:center;gap:8px;}
.ccard-header.no-driver{background:#fee2e2;}
.ccard-truck{font-size:11px;font-weight:800;color:#fff;background:rgba(255,255,255,.15);padding:2px 8px;border-radius:5px;}
.ccard-trailer{font-size:11px;font-weight:800;color:#c4b5fd;background:rgba(167,139,250,.2);padding:2px 8px;border-radius:5px;}
.ccard-driver{font-size:12px;font-weight:700;color:#86efac;flex:1;}
.ccard-nodrv{font-size:11px;font-weight:800;color:#b91c1c;flex:1;}
.ccard-miles{font-size:10px;color:rgba(255,255,255,.5);background:rgba(255,255,255,.08);padding:2px 7px;border-radius:5px;}

/* FINANCIAL BAR */
.fin-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:#f8fafc;border-bottom:1px solid #e2e8f0;flex-wrap:wrap;gap:6px;}
.fin-item{display:flex;align-items:center;gap:4px;}
.fin-label{font-size:9px;color:#64748b;font-weight:700;text-transform:uppercase;}
.fin-val{font-size:13px;font-weight:800;}
.fin-gross{color:#0f1f3d;}
.fin-local{color:#b45309;}
.fin-net-wrap{background:#f0fdf4;border:1.5px solid #22c55e;border-radius:8px;padding:3px 10px;display:flex;align-items:center;gap:4px;}
.fin-net{color:#15803d;font-size:15px;font-weight:900;}
.fin-sep{color:#94a3b8;font-size:13px;font-weight:700;}

/* CLAIM BAR */
.claim-bar{background:linear-gradient(90deg,#fef3c7,#fde68a);border-bottom:2px solid #f59e0b;padding:8px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.claim-label{font-size:11px;font-weight:700;color:#78350f;flex:1;min-width:100px;}
.claim-input{border:2px solid #f59e0b;border-radius:8px;padding:6px 10px;font-size:12px;font-weight:600;color:#78350f;background:#fff;outline:none;flex:1;min-width:120px;max-width:180px;}
.claim-btn{background:#d97706;color:#fff;border:none;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:800;cursor:pointer;white-space:nowrap;}

/* STOP ROW */
.stops{padding:8px 14px;}
.stop-row{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid #f1f5f9;}
.stop-row:last-child{border-bottom:none;}
.stop-num{width:18px;height:18px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#64748b;flex-shrink:0;margin-top:1px;}
.stop-info{flex:1;min-width:0;}
.stop-city{font-size:13px;font-weight:700;color:#0f1f3d;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.stop-dates{display:flex;gap:8px;flex-wrap:wrap;margin-top:3px;}
.stop-date{font-size:10px;color:#64748b;}
.stop-status{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;flex-shrink:0;white-space:nowrap;}

/* STATUS BADGE COLORS */
.st-dispatched{background:#dbeafe;color:#1e40af;}
.st-dock{background:#fef9c3;color:#713f12;}
.st-yard{background:#fef9c3;color:#713f12;}
.st-need{background:#fee2e2;color:#991b1b;}
.st-loaded{background:#dcfce7;color:#14532d;}
.st-delivered{background:#dcfce7;color:#065f46;}

/* STATUS GROUP HEADER */
.status-group{margin-bottom:16px;}
.status-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:4px 12px;border-radius:14px;margin-bottom:8px;}
.status-dot{width:7px;height:7px;border-radius:50%;}

/* STAT CARDS (dashboard) */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.stat-card{background:#fff;border-radius:12px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid #e2e8f0;}
.stat-icon{font-size:20px;margin-bottom:4px;}
.stat-val{font-size:20px;font-weight:900;color:#0f1f3d;}
.stat-label{font-size:10px;color:#64748b;font-weight:600;margin-top:2px;}
.stat-sub{font-size:10px;color:#94a3b8;margin-top:1px;}

/* PLANNED ROW (admin only) */
.prow{background:#fff;border-radius:12px;margin-bottom:8px;overflow:hidden;border:1px solid #e2e8f0;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.prow-banner{background:#0f1f3d;padding:8px 14px;display:flex;align-items:center;gap:8px;}
.prow-banner-route{font-size:12px;font-weight:700;color:#93c5fd;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.prow-banner-status{font-size:9px;font-weight:800;padding:2px 7px;border-radius:10px;}
.prow-details{padding:10px 14px;display:flex;flex-wrap:wrap;gap:8px;}
.prow-field{display:flex;flex-direction:column;gap:2px;}
.prow-field-label{font-size:9px;color:#94a3b8;font-weight:700;text-transform:uppercase;}
.prow-field-val{font-size:12px;font-weight:600;color:#374151;}

/* OTR CARD (admin) */
.otr-card{background:#1a0a2e;border:1px solid #4c1d95;border-radius:14px;overflow:hidden;margin-bottom:12px;}
.otr-card-hdr{padding:10px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(255,255,255,.08);}
.otr-driver{font-size:13px;font-weight:700;color:#c4b5fd;flex:1;}
.otr-truck{font-size:10px;font-weight:700;color:rgba(255,255,255,.5);background:rgba(255,255,255,.08);padding:2px 7px;border-radius:4px;}
.otr-status-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;}
.otr-stop-row{padding:8px 14px;border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;gap:8px;}
.otr-stop-city{font-size:12px;font-weight:600;color:#e2e8f0;flex:1;}
.otr-stop-del{font-size:10px;color:rgba(255,255,255,.4);}

/* LOGIN OVERLAY */
.login-overlay{position:fixed;inset:0;background:#0f1f3d;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;padding:24px;}
.login-logo{font-size:52px;margin-bottom:12px;}
.login-title{color:#fff;font-size:22px;font-weight:900;margin-bottom:4px;}
.login-sub{color:rgba(255,255,255,.4);font-size:12px;margin-bottom:32px;text-align:center;}
.login-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:28px 24px;width:100%;max-width:320px;}
.login-pin-label{color:rgba(255,255,255,.6);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;}
.login-pin-input{width:100%;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.15);border-radius:12px;padding:14px 16px;color:#fff;font-size:20px;font-family:inherit;outline:none;text-align:center;letter-spacing:.2em;margin-bottom:14px;}
.login-pin-input:focus{border-color:#3b82f6;}
.login-btn{width:100%;background:#3b82f6;color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:800;cursor:pointer;margin-bottom:10px;}
.login-view-btn{width:100%;background:transparent;color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.15);border-radius:12px;padding:12px;font-size:13px;font-weight:700;cursor:pointer;}
.login-err{color:#fca5a5;font-size:12px;text-align:center;margin-top:8px;}

/* LOADING */
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;gap:12px;}
.loading-spinner{width:36px;height:36px;border:3px solid #e2e8f0;border-top-color:#3b82f6;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:#94a3b8;font-weight:600;}

/* EMPTY STATE */
.empty{text-align:center;padding:40px 20px;color:#94a3b8;}
.empty-icon{font-size:40px;margin-bottom:10px;}
.empty-text{font-size:14px;font-weight:600;}

/* SECTION TITLE */
.section-title{font-size:18px;font-weight:800;color:#0f1f3d;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.section-count{font-size:12px;font-weight:600;color:#64748b;background:#f1f5f9;padding:2px 9px;border-radius:10px;}

/* NAV TABS (admin sections) */
.nav-tabs{display:flex;gap:1px;background:rgba(255,255,255,.06);padding:0 0 8px;}
.nav-tab{flex:1;text-align:center;padding:8px 4px;color:rgba(255,255,255,.4);font-size:10px;font-weight:700;cursor:pointer;border-bottom:2px solid transparent;}
.nav-tab.active{color:#38bdf8;border-bottom-color:#38bdf8;}

/* SEARCH */
.search-bar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:#f8fafc;border-bottom:1px solid #e2e8f0;}
.search-input{flex:1;border:1.5px solid #e2e8f0;border-radius:10px;padding:8px 12px;font-size:13px;outline:none;background:#fff;font-family:inherit;}
.search-input:focus{border-color:#3b82f6;}
.search-clear{background:none;border:none;color:#94a3b8;font-size:18px;cursor:pointer;padding:0 4px;line-height:1;flex-shrink:0;}
.search-result-card{background:#fff;border-radius:12px;margin-bottom:8px;overflow:hidden;border:1px solid #e2e8f0;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.search-result-hdr{background:#0f1f3d;padding:8px 12px;display:flex;align-items:center;gap:6px;}
.search-result-row{padding:8px 14px;border-top:1px solid #f1f5f9;display:flex;align-items:center;gap:8px;}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-top">
    <div>
      <div class="hdr-title">🚛 Freight Board</div>
      <div class="hdr-sub" id="hdr-sub">Loading...</div>
    </div>
    <div class="hdr-right">
      <div class="sync-dot loading" id="sync-dot"></div>
      <button class="admin-btn" id="admin-toggle-btn" onclick="toggleAdminLogin()">🔐 Admin</button>
    </div>
  </div>
  <!-- Admin section nav tabs (hidden for viewer) -->
  <div class="nav-tabs" id="admin-nav" style="display:none;">
    <div class="nav-tab active" data-tab="dashboard" data-tab="dashboard" onclick="switchAdminTab('dashboard')">📊 Dashboard</div>
    <div class="nav-tab" data-tab="planned" data-tab="planned" onclick="switchAdminTab('planned')">📋 Planned</div>
    <div class="nav-tab" data-tab="combined" data-tab="combined" onclick="switchAdminTab('combined')">🔄 Combined</div>
    <div class="nav-tab" data-tab="otr" data-tab="otr" onclick="switchAdminTab('otr')">🚛 OTR</div>
  </div>
</div>

<!-- LOGIN OVERLAY -->
<div class="login-overlay" id="login-overlay" style="display:none;">
  <div class="login-logo">🔐</div>
  <div class="login-title">Admin Access</div>
  <div class="login-sub">Enter your PIN to access the full board</div>
  <div class="login-card">
    <div class="login-pin-label">Admin PIN</div>
    <input class="login-pin-input" type="password" id="pin-input" maxlength="20" placeholder="••••" oninput="clearLoginErr()"/>
    <button class="login-btn" onclick="attemptLogin()">Unlock Board</button>
    <button class="login-view-btn" onclick="hideLoginOverlay()">Cancel — Stay as Viewer</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- MAIN CONTENT -->
<div style="padding-top:4px;">

  <!-- SEARCH BAR -->
  <div class="search-bar" id="search-bar-wrap">
    <input class="search-input" id="search-input" type="text" placeholder="🔍  Search loads, cities, drivers..." oninput="onSearch(this.value)" autocomplete="off" autocorrect="off" spellcheck="false"/>
    <button class="search-clear" id="search-clear-btn" onclick="clearSearch()" style="display:none;">✕</button>
  </div>
  <!-- SEARCH RESULTS (shown when searching) -->
  <div id="search-results" style="display:none;padding:10px 14px;"></div>

  <!-- WEEK SELECTOR -->
  <div style="padding:10px 14px 0;" id="week-selector-wrap">
    <div class="week-scroll" id="week-tabs"></div>
  </div>

  <!-- DASHBOARD SECTION -->
  <div class="section active" id="sec-dashboard">
    <div id="dash-content">
      <div class="loading-screen"><div class="loading-spinner"></div><div class="loading-text">Loading board...</div></div>
    </div>
  </div>

  <!-- PLANNED SECTION (admin only) -->
  <div class="section" id="sec-planned">
    <div id="planned-content">
      <div class="loading-screen"><div class="loading-spinner"></div><div class="loading-text">Loading...</div></div>
    </div>
  </div>

  <!-- COMBINED SECTION (admin only) -->
  <div class="section" id="sec-combined">
    <div id="combined-content">
      <div class="loading-screen"><div class="loading-spinner"></div><div class="loading-text">Loading...</div></div>
    </div>
  </div>

  <!-- OTR SECTION (admin only) -->
  <div class="section" id="sec-otr">
    <div id="otr-content">
      <div class="loading-screen"><div class="loading-spinner"></div><div class="loading-text">Loading...</div></div>
    </div>
  </div>

</div>

<!-- BOTTOM NAV (viewer only) -->
<div class="bnav" id="viewer-nav">
  <button class="bnav-btn active" onclick="scrollToTop()">
    <div class="bnav-icon">📊</div>Dashboard
  </button>
  <button class="bnav-btn" onclick="refreshData()">
    <div class="bnav-icon">🔄</div>Refresh
  </button>
</div>

  if(!photo||!photo.data)return Promise.resolve(photo);
  return new Promise(function(res){
    var img=new Image();
    img.onload=function(){
      var MAX=400;
      var w=img.width,h=img.height;
      if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
      if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
      var canvas=document.createElement("canvas");
      canvas.width=w;canvas.height=h;
      canvas.getContext("2d").drawImage(img,0,0,w,h);
      res({name:photo.name,ts:photo.ts,data:canvas.toDataURL("image/jpeg",0.55)});
    };
    img.onerror=function(){res(photo);};
    img.src=photo.data;
  });
}

function sheetsSave(data){
  var savedAt=Date.now();
  // Compress photos for cloud sync, then send to Sheets
  var weeks=data.weeks||[];
  // Collect all loads with real photos
  var photoPromises=[];
  var loadRefs=[];
  weeks.forEach(function(w,wi){
    (w.groups||[]).forEach(function(g,gi){
      (g.loads||[]).forEach(function(l,li){
        var urlPhotos=(l.photos||[]).filter(function(p){return p&&typeof p==="object"&&p.url;});
        var dataPhotos=(l.photos||[]).filter(function(p){return p&&typeof p==="object"&&p.data;});
        if(urlPhotos.length||dataPhotos.length){
          // URL photos: pass through; data photos: compress
          var promises=urlPhotos.map(function(p){return Promise.resolve(p);})
            .concat(dataPhotos.map(function(p){return compressPhotoForCloud(p);}));
          photoPromises.push(Promise.all(promises));
          loadRefs.push({wi:wi,gi:gi,li:li});
        }
      });
    });
  });
  Promise.all(photoPromises).then(function(results){
    // Deep clone weeks and inject compressed photos
    var weeksCopy=JSON.parse(JSON.stringify(weeks));
    results.forEach(function(compressed,idx){
      var ref=loadRefs[idx];
      weeksCopy[ref.wi].groups[ref.gi].loads[ref.li].photos=compressed;
    });
    var payload=Object.assign({},data,{weeks:weeksCopy,savedAt:savedAt});
    var saveToken=localStorage.getItem("fcbv2_sheetsToken")||"";
    var saveHeaders={"Content-Type":"text/plain;charset=utf-8"};
    if(saveToken)saveHeaders["X-App-Token"]=saveToken;
    // Use SHEETS_URL which has the hardcoded fallback
    var _url=localStorage.getItem("fcbv2_sheetsUrl")||SHEETS_URL;
    if(_url)fetch(_url,{method:"POST",mode:"no-cors",headers:saveHeaders,body:JSON.stringify({data:payload})});
  }).catch(function(){
    var saveToken=localStorage.getItem("fcbv2_sheetsToken")||"";
    var saveHeaders={"Content-Type":"text/plain;charset=utf-8"};
    if(saveToken)saveHeaders["X-App-Token"]=saveToken;
    var payload=Object.assign({},data,{savedAt:savedAt});
    var _url=localStorage.getItem("fcbv2_sheetsUrl")||SHEETS_URL;
    if(_url)fetch(_url,{method:"POST",mode:"no-cors",headers:saveHeaders,body:JSON.stringify({data:payload})});
  });
}

//     AUTH                                                    
function toggleAdminLogin() {
  if (isAdmin) {
    isAdmin = false;
    var btn = document.getElementById('admin-toggle-btn');
    btn.className = 'admin-btn';
    btn.textContent = '  Admin';
    btn.onclick = toggleAdminLogin;
    document.getElementById('admin-nav').style.display = 'none';
    document.getElementById('viewer-nav').style.display = 'flex';
    switchAdminTab('dashboard');
    renderAll();
  } else {
    showLoginOverlay();
  }
}

function showLoginOverlay() {
  document.getElementById('login-overlay').style.display = 'flex';
  setTimeout(function() { document.getElementById('pin-input').focus(); }, 100);
}

function hideLoginOverlay() {
  document.getElementById('login-overlay').style.display = 'none';
  document.getElementById('pin-input').value = '';
  document.getElementById('login-err').textContent = '';
}

function clearLoginErr() {
  document.getElementById('login-err').textContent = '';
}

function attemptLogin() {
  var pin = document.getElementById('pin-input').value.trim();
  if (!pin) return;

  // Read all possible stored PIN formats
  var storedPlain  = localStorage.getItem('fcbv2_adminPin') || '';
  var storedHash   = localStorage.getItem('fcbv2_adminPinHash') || '';

  // Step 1: Try plain text comparison immediately (no async needed)
  if (storedPlain && pin === storedPlain) {
    loginSuccess();
    return;
  }

  // Step 2: If no plain text match, try hash comparison
  if (typeof hashPin === 'function') {
    hashPin(pin).then(function(hash) {
      if (storedHash && hash === storedHash) {
        loginSuccess();
        return;
      }
      // Step 3: Re-try plain text after hash (in case storedPlain was set after initial read)
      var reCheck = localStorage.getItem('fcbv2_adminPin') || '';
      if (reCheck && pin === reCheck) {
        loginSuccess();
        return;
      }
      document.getElementById('login-err').textContent = 'Incorrect PIN — try again';
      document.getElementById('pin-input').value = '';
    }).catch(function() {
      // hashPin failed — fall back to plain text only
      var fallback = localStorage.getItem('fcbv2_adminPin') || '';
      if (fallback && pin === fallback) {
        loginSuccess();
      } else {
        document.getElementById('login-err').textContent = 'Incorrect PIN — try again';
        document.getElementById('pin-input').value = '';
      }
    });
  } else {
    // hashPin not available — plain text only
    document.getElementById('login-err').textContent = 'Incorrect PIN — try again';
    document.getElementById('pin-input').value = '';
  }
}

function loginSuccess() {
  isAdmin = true;
  hideLoginOverlay();
  var btn = document.getElementById('admin-toggle-btn');
  btn.className = 'logout-btn';
  btn.textContent = '  Logout';
  btn.onclick = toggleAdminLogin;
  document.getElementById('admin-nav').style.display = 'flex';
  document.getElementById('viewer-nav').style.display = 'none';
  renderAll();
}

document.getElementById('pin-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') attemptLogin();
});

//     HELPERS                                                  
function getWeek() {
  return weeks[activeWeekIdx] || {groups:[], localDeliveries:[], accessorials:[]};
}

function statusClass(st) {
  var m = {
    'Dispatched':'st-dispatched','Dock':'st-dock','Yard':'st-yard',
    'Need to pickup':'st-need','Need to Pickup':'st-need',
    'Loaded':'st-loaded','Delivered':'st-delivered','In Transit':'st-dispatched'
  };
  return m[st] || '';
}

function getStopCss(st) {
  var c = {
    'Preplanned': {bg:'#f1f5f9',c:'#475569',bd:'#94a3b8'},
    'Future': {bg:'#f5f3ff',c:'#5b21b6',bd:'#a78bfa'},
    'Not dispatched': {bg:'#fef9c3',c:'#713f12',bd:'#eab308'},
    'Loaded': {bg:'#dcfce7',c:'#14532d',bd:'#22c55e'},
    'Ready': {bg:'#f0fdf4',c:'#065f46',bd:'#16a34a'}
  };
  return c[st] || c['Preplanned'];
}

function calcLocCost(loads) {
  return loads.reduce(function(s, l) {
    if (l.manualLocalCharge !== '' && l.manualLocalCharge != null)
      return s + (parseFloat(l.manualLocalCharge) || 0);
    var sr = parseSR(l.sr || '');
    var am = cityMiles(sr.s);
    var um = (l.manualPickupMi !== '' && l.manualPickupMi != null) ? parseFloat(l.manualPickupMi) : am;
    return s + (um != null ? (localCharge(um) || 0) : 0);
  }, 0);
}

function getMiles(g) {
  if (g.tripMiles !== '' && g.tripMiles != null) return Math.round(parseFloat(g.tripMiles));
  if (g.calcTripMi) return Math.round(parseFloat(g.calcTripMi));
  if (g.autoTripMi) return Math.round(parseFloat(g.autoTripMi));
  return null;
}

function sortByDelivery(loads) {
  return loads.slice().sort(function(a, b) {
    var ta = new Date((a.delivery || '').split(' ')[0]).getTime() || Infinity;
    var tb = new Date((b.delivery || '').split(' ')[0]).getTime() || Infinity;
    return ta - tb;
  });
}

//     COMBINED CARD                                            
function renderCombinedCard(g) {
  var loads = g.loads || [];
  var sorted = sortByDelivery(loads);
  var gross = loads.reduce(function(s,l){ return s+(parseFloat(l.rate)||0); },0);
  var locCost = calcLocCost(loads);
  var net = Math.round(gross - locCost);
  var hasDriver = !!(g.groupDriver && g.groupDriver.trim());
  var mi = getMiles(g);
  var inputId = 'claim-inp-' + g.id;

  var h = '<div class="ccard">';

  // Header
  h += '<div class="ccard-header' + (hasDriver ? '' : ' no-driver') + '">';
  if (hasDriver) {
    if (g.groupTruck) h += '<span class="ccard-truck">#' + g.groupTruck + '</span>';
    if (g.groupTrailer) h += '<span class="ccard-trailer">T' + g.groupTrailer + '</span>';
    h += '<span class="ccard-driver">' + g.groupDriver + '</span>';
  } else {
    h += '<span style="font-size:14px">  </span><span class="ccard-nodrv">NO DRIVER ASSIGNED</span>';
  }
  if (mi) h += '<span class="ccard-miles">' + mi.toLocaleString() + ' mi</span>';
  h += '</div>';

  // Financial bar
  h += '<div class="fin-bar">';
  h += '<div class="fin-item"><span class="fin-label">Gross</span><span class="fin-val fin-gross">$' + Math.round(gross).toLocaleString() + '</span></div>';
  h += '<span class="fin-sep"> </span>';
  h += '<div class="fin-item"><span class="fin-label">Local</span><span class="fin-val fin-local">$' + Math.round(locCost).toLocaleString() + '</span></div>';
  h += '<span class="fin-sep">=</span>';
  h += '<div class="fin-net-wrap"><span style="font-size:9px;color:#15803d;font-weight:700">Net</span><span class="fin-net">$' + net.toLocaleString() + '</span></div>';
  h += '</div>';

  // Claim bar
  if (!hasDriver) {
    h += '<div class="claim-bar">';
    h += '<span style="font-size:16px"> </span>';
    h += '<span class="claim-label">Available   enter name to claim:</span>';
    h += '<input class="claim-input" id="' + inputId + '" type="text" placeholder="Your name...">';
    h += '<button class="claim-btn" data-gid="' + g.id + '" data-inp="' + inputId + '" onclick="claimLoad(this.dataset.gid,this.dataset.inp)">  Claim</button>';
    h += '</div>';
  }

  // Stops
  h += '<div class="stops">';
  sorted.forEach(function(l, li) {
    var sr = parseSR(l.sr || '');
    var dest = sr.r || sr.s || ' ';
    var stCls = statusClass(l.status || '');
    h += '<div class="stop-row">';
    h += '<div class="stop-num">' + (li+1) + '</div>';
    h += '<div class="stop-info"><div class="stop-city">' + dest + '</div>';
    h += '<div class="stop-dates">';
    if (l.pickup) h += '<span class="stop-date">  ' + l.pickup + '</span>';
    if (l.delivery) h += '<span class="stop-date">  ' + l.delivery + '</span>';
    h += '</div></div>';
    if (l.status) h += '<span class="stop-status ' + stCls + '">' + l.status + '</span>';
    h += '</div>';
  });
  h += '</div></div>';
  return h;
}

//     CLAIM LOAD                                               
function claimLoad(groupId, inputId) {
  var inp = document.getElementById(inputId);
  var name = (inp ? inp.value : '').trim();
  if (!name) { if (inp) inp.focus(); return; }

  var wkIdx = -1;
  for (var i = 0; i < weeks.length; i++) {
    if ((weeks[i].groups || []).some(function(g) { return String(g.id) === String(groupId); })) {
      wkIdx = i; break;
    }
  }
  if (wkIdx < 0) return;

  weeks[wkIdx].groups = weeks[wkIdx].groups.map(function(g) {
    if (String(g.id) !== String(groupId)) return g;
    return Object.assign({}, g, {groupDriver: name, securedBy: name, securedAt: Date.now()});
  });

  localStorage.setItem('fcbv2_localdata', JSON.stringify({weeks: weeks}));

  var local = JSON.parse(localStorage.getItem('fcbv2_localdata') || '{}');
  sheetsSave({
    weeks: weeks,
    customDrivers: local.customDrivers || [],
    customTrucks: local.customTrucks || [],
    customTrailers: local.customTrailers || [],
    dispatchers: local.dispatchers || [],
    truckAssignments: local.truckAssignments || {},
    dispatcherEmails: local.dispatcherEmails || [],
    adminPin: localStorage.getItem('fcbv2_adminPin') || '',
    viewerPin: localStorage.getItem('fcbv2_viewerPin') || ''
  }).then(function() { renderAll(); }).catch(function() { renderAll(); });
}

//     DASHBOARD                                                
function renderDashboard() {
  var w = getWeek();
  var groups = w.groups || [];
  var loads = groups.reduce(function(a, g) { return a.concat(g.loads || []); }, []);
  var combined = groups.filter(function(g) { return g.isCombined; });
  var gross = loads.reduce(function(s,l){ return s+(parseFloat(l.rate)||0); },0);
  var locTotal = calcLocCost(loads);
  var net = Math.round(gross - locTotal);
  var mi = groups.reduce(function(s,g){ return s+(getMiles(g)||0); },0);
  var todayMs = new Date().setHours(0,0,0,0);
  var tomMs = todayMs + 86400000;
  var DONE = ['Picked Up','In Transit','Loaded','Delivered'];
  var cToday = loads.filter(function(l) {
    var pd = parsePickupDate(l.pickup); return pd && pd.getTime()===todayMs && !DONE.includes(l.status||'');
  }).length;
  var cTom = loads.filter(function(l) {
    var pd = parsePickupDate(l.pickup); return pd && pd.getTime()===tomMs && !DONE.includes(l.status||'');
  }).length;

  var h = '';

  // Stats
  h += '<div class="stats-grid">';
  h += statCard(' ','$'+net.toLocaleString(),'Net Revenue','$'+Math.round(gross).toLocaleString()+' gross');
  h += statCard(' ',loads.length,'Total Loads',groups.length+' trailers');
  if (cToday>0) h += statCard(' ',cToday,'Picks Today','');
  if (cTom>0) h += statCard(' ',cTom,'Picks Tomorrow','');
  if (mi>0) h += statCard(' ',mi.toLocaleString()+' mi','Miles','');
  h += '</div>';

  // Combined loads
  h += '<div class="section-title">  Combined Loads <span class="section-count">'+combined.length+'</span></div>';
  if (!combined.length) {
    h += '<div class="empty"><div class="empty-icon"> </div><div class="empty-text">No combined loads this week</div></div>';
  } else {
    var STATUS_ORDER = ['Preplanned','Not dispatched','Loaded','Future','Ready'];
    var byStatus = {};
    STATUS_ORDER.forEach(function(s){ byStatus[s]=[]; });
    combined.forEach(function(g){
      var st = g.combinedStatus||'Preplanned';
      if(!byStatus[st]) byStatus[st]=[];
      byStatus[st].push(g);
    });
    STATUS_ORDER.forEach(function(st){
      if(!byStatus[st]||!byStatus[st].length) return;
      var sc = getStopCss(st);
      h += '<div class="status-group">';
      h += '<div class="status-badge" style="background:'+sc.bg+';color:'+sc.c+';border:1.5px solid '+sc.bd+'">';
      h += '<div class="status-dot" style="background:'+sc.bd+'"></div>'+st;
      h += ' <span style="opacity:.6">'+byStatus[st].length+'</span></div>';
      byStatus[st].forEach(function(g){ h += renderCombinedCard(g); });
      h += '</div>';
    });
  }

  document.getElementById('dash-content').innerHTML = h;
}

function statCard(icon, val, label, sub) {
  return '<div class="stat-card"><div class="stat-icon">'+icon+'</div>'+
    '<div class="stat-val">'+val+'</div>'+
    '<div class="stat-label">'+label+'</div>'+
    (sub?'<div class="stat-sub">'+sub+'</div>':'')+
    '</div>';
}

        var gross = parseFloat(l.rate)||0;

        if (l.weight) h += fld('   Weight',l.weight+' lbs');
        if (l.driver) h += fld('  Driver',l.driver);
        if (l.localTruck) h += fld('  Truck','#'+l.localTruck);
        if (l.localTrailer) h += fld('  Trailer',l.localTrailer);
        if (gross) h += fld('  Rate','$'+gross.toLocaleString());
        if (lc) h += fld('  Local','$'+Math.round(lc).toLocaleString());

function fld(label, val) {

}

//     COMBINED (admin)

//     DATA LOADING                                             
function setSync(state) {
  var dot = document.getElementById('sync-dot');
  dot.className = 'sync-dot'+(state==='loading'?' loading':state==='err'?' err':'');
}

function refreshData() {
  setSync('loading');
  document.getElementById('hdr-sub').textContent = 'Syncing...';
  sheetsLoad('viewer','').then(function(data){
    var raw = Array.isArray(data) ? data : (data.weeks||[]);
    weeks = raw.map(function(w){
      return Object.assign({},w,{groups:(w.groups||[]).map(function(g){
        return Object.assign({},g,{loads:(g.loads||[]).map(function(l){
          var c=Object.assign({},l); delete c.tripPrice; return c;
        })});
      })});
    });
    var payload = (typeof data === 'object' && !Array.isArray(data)) ? Object.assign({},data,{weeks:weeks}) : {weeks:weeks};
    localStorage.setItem('fcbv2_localdata', JSON.stringify(payload));
    // Extract adminPin to its own key so mobile login can find it
    if (data && data.adminPin) {
      localStorage.setItem('fcbv2_adminPin', data.adminPin);
    }
    if (data && data.viewerPin) {
      localStorage.setItem('fcbv2_viewerPin', data.viewerPin);
    }
    activeWeekIdx = 0;
    setSync('ok');
    document.getElementById('hdr-sub').textContent = weeks[0] ? (weeks[0].label||'Week 1') : 'No data';
    renderAll();
  }).catch(function(){
    setSync('err');
    document.getElementById('hdr-sub').textContent = 'Could not connect to Sheets';
    var local = localStorage.getItem('fcbv2_localdata');
    if (local) {
      try { var d=JSON.parse(local); weeks=Array.isArray(d)?d:(d.weeks||[]); } catch(e){}
    }
    renderAll(); // Always render even on error
  });
}

//     INIT                                                     
// SEARCH
var searchQuery = '';

function onSearch(val) {
  searchQuery = (val || '').trim().toLowerCase();
  var clearBtn = document.getElementById('search-clear-btn');
  var resultsDiv = document.getElementById('search-results');
  var weekWrap = document.getElementById('week-selector-wrap');
  var mainSections = document.querySelectorAll('.section');
  if (!searchQuery) { clearSearch(); return; }
  clearBtn.style.display = 'block';
  resultsDiv.style.display = 'block';
  weekWrap.style.display = 'none';
  mainSections.forEach(function(s){ s.style.display = 'none'; });
  renderSearchResults(searchQuery);
}

function clearSearch() {
  searchQuery = '';
  var inp = document.getElementById('search-input');
  var clearBtn = document.getElementById('search-clear-btn');
  var resultsDiv = document.getElementById('search-results');
  var weekWrap = document.getElementById('week-selector-wrap');
  var mainSections = document.querySelectorAll('.section');
  if (inp) inp.value = '';
  clearBtn.style.display = 'none';
  resultsDiv.style.display = 'none';
  weekWrap.style.display = 'block';
  mainSections.forEach(function(s){ s.style.display = 'none'; });
  var active = document.getElementById('sec-' + (activeAdminTab || 'dashboard'));
  if (active) active.style.display = 'block';
}

function renderSearchResults(q) {
  var resultsDiv = document.getElementById('search-results');
  var matches = [];
  weeks.forEach(function(w) {
    (w.groups || []).forEach(function(g) {
      var gHay = ((g.groupDriver||'') + ' ' + (g.groupTruck||'') + ' ' + (g.groupTrailer||'')).toLowerCase();
      (g.loads || []).forEach(function(l) {
        var hay = (l.sr||'') + ' ' + (l.broker||'') + ' ' + (l.loadNum||'') + ' ' + (l.status||'') + ' ' + (l.pickup||'') + ' ' + (l.delivery||'') + ' ' + gHay;
        if (hay.toLowerCase().indexOf(q) >= 0) {
          var parts = (l.sr || '').split(' - ');
          matches.push({ week:w.label||'', truck:g.groupTruck||'', trailer:g.groupTrailer||'', driver:g.groupDriver||'', shipper:parts[0]||'', receiver:parts[1]||parts[0]||'', pickup:l.pickup||'', delivery:l.delivery||'', status:l.status||'', rate:l.rate||'', broker:l.broker||'', isCombined:!!g.isCombined });
        }
      });
    });
    (w.localDeliveries || []).forEach(function(r) {
      var hay = ((r.destination||'') + ' ' + (r.driver||'') + ' ' + (r.broker||'') + ' ' + (r.truck||'')).toLowerCase();
      if (hay.indexOf(q) >= 0) {
        matches.push({ week:w.label||'', truck:r.truck||'', trailer:r.trailer||'', driver:r.driver||'', shipper:'Local pickup', receiver:r.destination||'', pickup:r.datetime||'', delivery:'', status:r.status||'', rate:r.amount||'', broker:r.broker||'', isLocal:true });
      }
    });
  });
  if (!matches.length) {
    resultsDiv.innerHTML = '<div class="empty"><div class="empty-icon">    </div><div class="empty-text">No results for "' + q + '"</div></div>';
    return;
  }
  var html = '<div style="font-size:11px;color:#64748b;font-weight:600;margin-bottom:8px;">' + matches.length + ' result' + (matches.length !== 1 ? 's' : '') + '</div>';
  matches.forEach(function(m) {
    var stCls = statusClass(m.status);
    var typeTag = m.isLocal
      ? '<span style="font-size:9px;background:#d1fae5;color:#065f46;padding:1px 5px;border-radius:3px;font-weight:700">LOCAL</span>'
      : m.isCombined
        ? '<span style="font-size:9px;background:#ede9fe;color:#5b21b6;padding:1px 5px;border-radius:3px;font-weight:700">COMBINED</span>'
        : '<span style="font-size:9px;background:#dbeafe;color:#1e40af;padding:1px 5px;border-radius:3px;font-weight:700">PLANNED</span>';
    html += '<div class="search-result-card">';
    html += '<div class="search-result-hdr">';
    if (m.truck) html += '<span style="font-size:10px;font-weight:800;color:#fff;background:rgba(255,255,255,.12);padding:2px 6px;border-radius:4px">#' + m.truck + '</span>';
    if (m.trailer) html += '<span style="font-size:10px;font-weight:800;color:#c4b5fd;background:rgba(167,139,250,.15);padding:2px 6px;border-radius:4px">T' + m.trailer + '</span>';
    html += '<span style="font-size:11px;font-weight:700;color:#86efac;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + (m.driver || 'No driver') + '</span>';
    html += typeTag + '</div>';
    html += '<div style="padding:8px 12px">';
    html += '<div style="font-size:11px;color:#64748b;margin-bottom:1px">' + m.shipper + '</div>';
    html += '<div style="font-size:13px;font-weight:700;color:#0f1f3d;margin-bottom:6px">&#8594; ' + m.receiver + '</div>';
    html += '<div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center">';
    if (m.pickup) html += '<span style="font-size:10px;color:#0369a1;background:#e0f2fe;padding:1px 6px;border-radius:3px">' + m.pickup + '</span>';
    if (m.delivery) html += '<span style="font-size:10px;color:#64748b;background:#f1f5f9;padding:1px 6px;border-radius:3px">' + m.delivery + '</span>';
    if (m.rate) html += '<span style="font-size:10px;font-weight:700;color:#059669">$' + parseFloat(m.rate||0).toLocaleString() + '</span>';
    if (m.status) html += '<span class="stop-status ' + stCls + '">' + m.status + '</span>';
    if (m.week) html += '<span style="font-size:9px;color:#94a3b8;margin-left:auto">' + m.week + '</span>';
    html += '</div>';
    if (m.broker) html += '<div style="font-size:10px;color:#94a3b8;margin-top:4px">' + m.broker + '</div>';
    html += '</div></div>';
  });
  resultsDiv.innerHTML = html;
}

(function init(){
  // Always render immediately (even with empty weeks) to replace the spinner
  var local = localStorage.getItem('fcbv2_localdata');
  if (local) {
    try { var d=JSON.parse(local); weeks=Array.isArray(d)?d:(d.weeks||[]); } catch(e){}
  }
  renderAll(); // Always render - replaces spinner with either data or empty state
  refreshData(); // Then fetch fresh from Sheets
  setInterval(refreshData, 60000);
})();


</script>
