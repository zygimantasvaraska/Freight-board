function cityMiles(s){if(!s)return null;const c=s.split(",")[0].trim().toLowerCase();if(DIST[c]!==undefined)return DIST[c];for(const k of Object.keys(DIST))if((c.includes(k)||k.includes(c))&&k.length>4)return DIST[k];return null;}
const TIERS=[[10,250],[25,300],[50,350],[75,400],[100,450],[125,500],[150,550]];
function localCharge(m){if(m==null||m==="")return null;const v=parseFloat(m);if(isNaN(v)||v<0)return null;if(v===0)return 250;for(const[mx,c]of TIERS)if(v<=mx)return c;return 550;}
function parsePickupDate(s=""){const dm=s.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);if(!dm)return null;const d=new Date(+dm[3],+dm[1]-1,+dm[2]);d.setHours(0,0,0,0);return d;}
function parseTS(s=""){const dm=s.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);if(!dm)return Infinity;const d=new Date(+dm[3],+dm[1]-1,+dm[2]);const tm=s.match(/(\d+):?(\d*)\s*(AM|PM)/i);if(tm){let h=+tm[1],m=+(tm[2]||0);if(tm[3].toUpperCase()==="PM"&&h!==12)h+=12;if(tm[3].toUpperCase()==="AM"&&h===12)h=0;d.setHours(h,m);}else{d.setHours(0,0,0,0);}return d.getTime();}
function parseSR(t=""){const i=t.indexOf(" - ");return i<0?{s:t.trim(),r:""}:{s:t.slice(0,i).trim(),r:t.slice(i+3).trim()};}

function rowColor(load,today,tomorrow){
  if(load.status==="Delivered")return{bg:"#86efac",stripe:"#16a34a",tc:"#000000",bold:true};
  if(load.status==="Loaded")return{bg:"#86efac",stripe:"#16a34a",tc:"#000000",bold:true};
  if(load.status==="In Transit"||load.status==="Dispatched")return{bg:"#fb923c",stripe:"#c2410c",tc:"#000000",bold:true};
  if(load.status==="Dock"||load.status==="Yard")return{bg:"#c4b5fd",stripe:"#6d28d9",tc:"#000000",bold:true};
  if(load.status==="Picked Up")return{bg:"#fde047",stripe:"#ca8a04",tc:"#000000",bold:true};
  const pd=parsePickupDate(load.pickup);
  if(!pd)return{bg:"#dbeafe",stripe:"#3b82f6",tc:"#1e3a5f",bold:false};
  const pt=pd.getTime(),t=today.getTime(),tm=tomorrow?tomorrow.getTime():t+86400000;
  if(pt===t)return{bg:"#fde047",stripe:"#ca8a04",tc:"#000000",bold:true};
  if(pt===tm)return{bg:"#f87171",stripe:"#b91c1c",tc:"#000000",bold:true};
  if(pt>tm)return{bg:"#f87171",stripe:"#b91c1c",tc:"#000000",bold:true};
  return{bg:"#dbeafe",stripe:"#3b82f6",tc:"#1e3a5f",bold:false};
}

function calcGroup(g){
  const loads=g.loads.map(l=>{const{s,r}=parseSR(l.sr);const am=cityMiles(s);const um=(l.manualPickupMi!==""&&l.manualPickupMi!=null)?parseFloat(l.manualPickupMi):am;return{...l,shipper:s,receiver:r,pickupMiAuto:am,pickupMiUsed:um,localCharge:localCharge(um),tripPrice:parseFloat(l.rate)||0};});
  const sd=[...loads].sort((a,b)=>parseTS(a.delivery)-parseTS(b.delivery));
  const so={};sd.forEach((l,i)=>{so[l.id]=i+1;});
  const sp=[...loads].sort((a,b)=>parseTS(a.pickup)-parseTS(b.pickup));
  const rcvrs=sd.map(l=>l.receiver).filter(Boolean);
  const tm=g.tripMiles?parseFloat(g.tripMiles):null;
  const gross=loads.reduce((s,l)=>s+l.tripPrice,0);
  const loc=loads.reduce((s,l)=>s+(l.localCharge||0),0);
  const rpm=(tm&&tm>0)?+((gross-loc)/tm).toFixed(2):null;
  return{...g,calcTripMi:tm,rcvrs,rpm,gross,loc,loads:sd.map(l=>({...l,stop:so[l.id]??null}))};
}

// ── SHEETS API ────────────────────────────────────────────────────────────────
async function sheetsLoad(){
  const r=await fetch(SHEETS_URL,{redirect:"follow"});
  if(!r.ok)throw new Error("HTTP "+r.status);
  const d=await r.json();
  return d;
}
async function sheetsSave(data){
  const payload={...data,savedAt:Date.now()};
  // Use no-cors mode — we can't read the response but the save goes through
  await fetch(SHEETS_URL,{
    method:"POST",
    mode:"no-cors",
    headers:{"Content-Type":"text/plain;charset=utf-8"},
    body:JSON.stringify({data:payload})
  });
}

  const attempt=()=>{
    if(mode==="admin"){if(pin===adminPin)onLogin("admin");else{setErr("Incorrect PIN");setPin("");}}
    else{if(pin===viewerPin)onLogin("viewer");else{setErr("Incorrect PIN");setPin("");}}
  };
  return(
    <div className="login-wrap">
      <div className="login-card fade-in">
        <div style={{textAlign:"center",marginBottom:"28px"}}>
          <div style={{width:"54px",height:"54px",background:"#0f1f3d",borderRadius:"14px",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px",fontSize:"26px"}}>🚛</div>
          <div className="login-logo">Freight Board</div>
          <div className="login-sub">Romeoville, IL Hub · Restricted Access</div>
        </div>
        {!mode?(
          <>
            <button className="mode-btn" onClick={()=>setMode("admin")}><div className="mode-icon" style={{background:"#1e3a5f"}}>🔐</div><div><div style={{fontSize:"13px",fontWeight:"700",color:"#0f1f3d"}}>Admin Access</div><div style={{fontSize:"11px",color:"#64748b",fontWeight:"400"}}>Full board control</div></div></button>
            <button className="mode-btn" onClick={()=>setMode("viewer")}><div className="mode-icon" style={{background:"#064e3b"}}>👁</div><div><div style={{fontSize:"13px",fontWeight:"700",color:"#0f1f3d"}}>View Board</div><div style={{fontSize:"11px",color:"#64748b",fontWeight:"400"}}>Live read-only access</div></div></button>
          </>
        ):(
          <div className="fade-in">
            <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"16px"}}>
              <button onClick={()=>{setMode(null);setPin("");setErr("");}} style={{background:"#f1f5f9",border:"1px solid #e2e8f0",borderRadius:"6px",padding:"4px 10px",fontSize:"11px",fontWeight:"600",color:"#475569",cursor:"pointer"}}>← Back</button>
              <span style={{fontSize:"13px",fontWeight:"700",color:"#0f1f3d"}}>{mode==="admin"?"Admin PIN":"Viewer PIN"}</span>
            </div>
            <input ref={inputRef} type="password" className="pin-input" value={pin} onChange={e=>setPin(e.target.value)} onKeyDown={e=>e.key==="Enter"&&attempt()} placeholder="••••" maxLength={20} autoComplete="off"/>
            {err&&<div className="pin-error">{err}</div>}
            <button className="login-btn" onClick={attempt}>{mode==="admin"?"Enter Admin Mode":"View Board →"}</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App(){
  const[appMode,setAppMode]=useState(null);
  const[weeks,setWeeks]=useState([]);
  const[activeWeek,setActiveWeek]=useState(0);
  const[activeTab,setActiveTab]=useState("weeks");
  const[saveStatus,setSaveStatus]=useState("idle");
  const[loading,setLoading]=useState(true);
  const[apiKey,setApiKey]=useState(()=>localStorage.getItem("fcbv2_apikey")||"");
  const[showPinModal,setShowPinModal]=useState(false);
  const[showApiModal,setShowApiModal]=useState(false);
  const[showRecover,setShowRecover]=useState(false);
  const[rcLoading,setRcLoading]=useState({});
  const[notifications,setNotifications]=useState([]);
  const[showNotif,setShowNotif]=useState(false);
  const[archivedWeeks,setArchivedWeeks]=useState(()=>{try{return JSON.parse(localStorage.getItem("fcbv2_archive")||"[]");}catch{return[];}});
  const saveTimer=useRef(null);
  const apiKeyRef=useRef(apiKey);
  useEffect(()=>{apiKeyRef.current=apiKey;},[apiKey]);
  const isViewer=appMode==="viewer";
  const[searchQuery,setSearchQuery]=useState("");
  const[showSearch,setShowSearch]=useState(false);
  const[searchResults,setSearchResults]=useState([]);
  const[searchIdx,setSearchIdx]=useState(0);
  const searchRef=useRef(null);

  const today=useMemo(()=>{const d=new Date();d.setHours(0,0,0,0);return d;},[]);
  const tomorrow=useMemo(()=>{const d=new Date(today);d.setDate(d.getDate()+1);return d;},[today]);

  // ── Load from Sheets on login ─────────────────────────────────────────────
  useEffect(()=>{
    if(!appMode)return;
    setLoading(true);
    sheetsLoad()
      .then(data=>{
        const rawWeeks=Array.isArray(data)?data:(data.weeks||[]);
        if(rawWeeks.length>0){
          setWeeks(rawWeeks);
        } else {
          // Sheets is empty — start with a blank week
          setWeeks([mkWeek("Week of "+new Date().toLocaleDateString("en-US"))]);
        }
        setLoading(false);
      })
      .catch(()=>{
        setWeeks([mkWeek(new Date().toLocaleDateString("en-US",{month:"numeric",day:"numeric",year:"numeric"}))]);
        setLoading(false);
        setSaveStatus("error");
      });
  },[appMode]);

  // ── Ctrl+F search ────────────────────────────────────────────────────────────
  useEffect(()=>{
    const handler=(e)=>{
      if((e.ctrlKey||e.metaKey)&&e.key==="f"){
        e.preventDefault();
        setShowSearch(s=>{if(!s)setTimeout(()=>searchRef.current?.focus(),50);return true;});
      }
      if(e.key==="Escape")setShowSearch(false);
    };
    window.addEventListener("keydown",handler);
    return()=>window.removeEventListener("keydown",handler);
  },[]);

  // ── Run search across ALL weeks ───────────────────────────────────────────
  useEffect(()=>{
    if(!searchQuery.trim()){setSearchResults([]);setSearchIdx(0);return;}
    const q=searchQuery.toLowerCase().trim();
    const results=[];
    weeks.forEach((w,wi)=>{
      (w.groups||[]).forEach((g,gi)=>{
        (g.loads||[]).forEach((l,li)=>{
          const fields=[l.sr,l.broker,l.pickup,l.delivery,l.product,l.driver,l.status,l.notes,g.groupDriver].join(" ").toLowerCase();
          if(fields.includes(q)){
            results.push({weekIdx:wi,weekLabel:w.label,groupId:g.id,loadId:l.id,sr:l.sr,broker:l.broker,pickup:l.pickup,delivery:l.delivery,driver:g.groupDriver||l.driver,status:l.status});
          }
        });
        // Also search local deliveries and crossdock
        (w.localDeliveries||[]).forEach(r=>{
          const fields=[r.destination,r.broker,r.loadNum,r.driver,r.datetime,r.status].join(" ").toLowerCase();
          if(fields.includes(q))results.push({weekIdx:wi,weekLabel:w.label,groupId:null,loadId:r.id,sr:r.destination,broker:r.broker+" #"+r.loadNum,pickup:r.datetime,delivery:"Local",driver:r.driver,status:r.status});
        });
        (w.crossdockDrops||[]).forEach(r=>{
          const fields=[r.location,r.broker,r.loadNum,r.driver,r.datetime,r.status].join(" ").toLowerCase();
          if(fields.includes(q))results.push({weekIdx:wi,weekLabel:w.label,groupId:null,loadId:r.id,sr:r.location,broker:r.broker+" #"+r.loadNum,pickup:r.datetime,delivery:"Crossdock",driver:r.driver,status:r.status});
        });
      });
    });
    setSearchResults(results);
    setSearchIdx(0);
  },[searchQuery,weeks]);

  // ── Notifications: check every 60s for pickups within 2 hours with no status ──
  useEffect(()=>{
    if(!appMode||isViewer)return;
    const check=()=>{
      const now=Date.now();
      const notifs=[];
      weeks.forEach(w=>{
        (w.groups||[]).forEach(g=>{
          (g.loads||[]).forEach(l=>{
            if(l.status)return;
            const ts=parseTS(l.pickup);
            if(ts===Infinity)return;
            const diff=ts-now;
            if(diff>0&&diff<2*3600000){
              notifs.push({id:l.id,sr:l.sr,pickup:l.pickup,week:w.label});
            }
          });
        });
      });
      setNotifications(notifs);
    };
    check();
    const interval=setInterval(check,60000);
    return()=>clearInterval(interval);
  },[weeks,appMode,isViewer]);

  // ── Rate Con AI extraction ──────────────────────────────────────────────────
  const handleRateCon=async(file,groupId)=>{
    const key=apiKeyRef.current;
    if(!key){alert("Please add your Anthropic API key first (⚙ API Key button).");return;}
    setRcLoading(p=>({...p,[groupId]:true}));
    try{
      const base64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file);});
      const mediaType=file.type||"application/pdf";
      const response=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({
          model:"claude-opus-4-6",max_tokens:1000,
          messages:[{role:"user",content:[
            {type:mediaType==="application/pdf"?"document":"image",source:{type:"base64",media_type:mediaType,data:base64}},
            {type:"text",text:`Extract from this rate confirmation: shipper city+state, receiver city+state, pickup date/time, delivery date/time, product/commodity, pallets, weight, rate amount, broker name, load number. Return JSON only: {"shipper":"","receiver":"","pickup":"","delivery":"","product":"","pallets":"","weight":"","rate":"","broker":"","loadNum":""}`}
          ]}]
        })
      });
      const data=await response.json();
      const text=data.content?.[0]?.text||"";
      const match=text.match(/\{[\s\S]*\}/);
      if(!match)throw new Error("No JSON");
      const parsed=JSON.parse(match[0]);
      const sr=`${parsed.shipper||""} - ${parsed.receiver||""}`.trim().replace(/^-\s*|-\s*$/g,"");
      const brokerStr=parsed.broker&&parsed.loadNum?`${parsed.broker} & ${parsed.loadNum}`:parsed.broker||parsed.loadNum||"";
      setWeeksAndSave(p=>p.map((w,i)=>i!==activeWeek?w:{...w,groups:w.groups.map(g=>{
        if(g.id!==groupId)return g;
        const newLoad=mkLoad({sr,broker:brokerStr,pickup:parsed.pickup||"",delivery:parsed.delivery||"",product:parsed.product||"",pallets:parsed.pallets||"",weight:parsed.weight||"",rate:parsed.rate||""});
        return{...g,loads:[...g.loads,newLoad]};
      })}));
    }catch(e){alert("Could not read rate confirmation: "+e.message);}
    setRcLoading(p=>({...p,[groupId]:false}));
  };

  // ── Archive week ───────────────────────────────────────────────────────────
  const archiveWeek=(weekIdx)=>{
    if(!confirm("Archive this week? It will be moved to the Archive tab."))return;
    const w=weeks[weekIdx];
    const entry={...w,archivedAt:new Date().toLocaleString()};
    const newArchive=[entry,...archivedWeeks];
    setArchivedWeeks(newArchive);
    localStorage.setItem("fcbv2_archive",JSON.stringify(newArchive));
    setWeeksAndSave(p=>p.filter((_,i)=>i!==weekIdx));
    setActiveWeek(0);
  };

  // ── Auto-save to Sheets on every change ───────────────────────────────────────
  const saveToSheets=useCallback((w)=>{
    clearTimeout(saveTimer.current);
    setSaveStatus("saving");
    saveTimer.current=setTimeout(async()=>{
      try{
        await sheetsSave({weeks:w});
        // no-cors means we can't read response but if no exception = success
        setSaveStatus("saved");
        setTimeout(()=>setSaveStatus("idle"),3000);
      }catch(err){
        // Only show error if it's a real network failure
        if(err.name==="TypeError"){
          setSaveStatus("error");
        } else {
          // no-cors opaque response — treat as success
          setSaveStatus("saved");
          setTimeout(()=>setSaveStatus("idle"),3000);
        }
      }
    },800);
  },[]);

  const setWeeksAndSave=useCallback((updater)=>{
    setWeeks(prev=>{
      const next=typeof updater==="function"?updater(prev):updater;
      saveToSheets(next); // both admin and viewer can save driver assignments
      return next;
    });
  },[saveToSheets]);

  const week=weeks[Math.min(activeWeek,weeks.length-1)];
  const computed=useMemo(()=>(week?.groups||[]).map(calcGroup),[week]);
  const allLoads=computed.flatMap(g=>g.loads);
  const totGross=computed.reduce((s,g)=>s+g.gross,0);
  const totLocal=computed.reduce((s,g)=>s+g.loc,0);
  const totAcc=(week?.accessorials||[]).reduce((s,a)=>s+(parseFloat(a.amount)||0),0);
  const pendingGroups=[...computed.filter(g=>g.groupStatus!=="In Transit"&&g.groupStatus!=="Delivered")].sort((a,b)=>Math.min(...a.loads.map(l=>parseTS(l.pickup)))-Math.min(...b.loads.map(l=>parseTS(l.pickup))));
  const otrGroups=computed.filter(g=>g.groupStatus==="In Transit"||g.groupStatus==="Delivered");

  const cToday=allLoads.filter(l=>{const pd=parsePickupDate(l.pickup);return pd&&pd.getTime()===today.getTime()&&!l.status;}).length;
  const cTomorrow=allLoads.filter(l=>{const pd=parsePickupDate(l.pickup);return pd&&pd.getTime()===tomorrow.getTime()&&!l.status;}).length;
  const cFuture=allLoads.filter(l=>{const pd=parsePickupDate(l.pickup);return pd&&pd.getTime()>tomorrow.getTime()&&!l.status;}).length;
  const cDelToday=allLoads.filter(l=>{const pd=parsePickupDate(l.delivery);return pd&&pd.getTime()===today.getTime();}).length;
  const cDelTomorrow=allLoads.filter(l=>{const pd=parsePickupDate(l.delivery);return pd&&pd.getTime()===tomorrow.getTime();}).length;
  const cDelivered=allLoads.filter(l=>l.status==="Delivered").length;
  const cLocalToday=(week?.localDeliveries||[]).filter(r=>{const pd=parsePickupDate(r.datetime);return pd&&pd.getTime()===today.getTime();}).length;
  const cLocalTomorrow=(week?.localDeliveries||[]).filter(r=>{const pd=parsePickupDate(r.datetime);return pd&&pd.getTime()===tomorrow.getTime();}).length;
  const cCrossdock=(week?.crossdockDrops||[]).filter(r=>r.status!=="Delivered").length;
  // Extra Added: sum of non-highest rates on multi-stop trailers
  const wagesBase=computed.filter(g=>g.loads.length>1).reduce((s,g)=>{const rates=g.loads.map(l=>l.tripPrice).sort((a,b)=>b-a);return s+rates.slice(1).reduce((x,r)=>x+r,0);},0);
  const overallRPM=(()=>{const totalMi=computed.reduce((s,g)=>s+(g.calcTripMi||0),0);const net=totGross-totLocal;return totalMi>0?+((net/totalMi).toFixed(2)):null;})();

  // ── Helpers ───────────────────────────────────────────────────────────────
  const setW=(f,v)=>setWeeksAndSave(p=>p.map((w,i)=>i!==activeWeek?w:{...w,[f]:v}));
  const toggleSection=k=>setW("openSections",{...week.openSections,[k]:!week.openSections?.[k]});
  const setLoad=(gid,lid,f,v)=>setW("groups",week.groups.map(g=>g.id!==gid?g:{...g,loads:g.loads.map(l=>l.id!==lid?l:{...l,[f]:v})}));
  const setGroup=(gid,f,v)=>setW("groups",week.groups.map(g=>g.id!==gid?g:{...g,[f]:v}));
  const addLoad=gid=>setW("groups",week.groups.map(g=>g.id!==gid?g:{...g,loads:[...g.loads,mkLoad()]}));
  const removeLoad=(gid,lid)=>setW("groups",week.groups.map(g=>{if(g.id!==gid)return g;const ls=g.loads.filter(l=>l.id!==lid);return{...g,loads:ls.length?ls:[mkLoad()]};}));
  const addGroup=()=>setW("groups",[...week.groups,mkGroup()]);
  const removeGroup=gid=>{if(week.groups.length>1)setW("groups",week.groups.filter(g=>g.id!==gid));};
  const updSub=(sec,id,f,v)=>setW(sec,(week[sec]||[]).map(r=>r.id!==id?r:{...r,[f]:v}));
  const addSub=(sec,mk)=>setW(sec,[...(week[sec]||[]),mk()]);
  const removeSub=(sec,id)=>setW(sec,(week[sec]||[]).filter(r=>r.id!==id));
  const addWeek=()=>{const l=prompt("Week label (e.g. 3.30.2026 - 4.6.2026)");if(!l)return;setWeeksAndSave(p=>[...p,mkWeek(l)]);setActiveWeek(weeks.length);};
  const removeWeek=i=>{if(weeks.length<=1){alert("Cannot remove last week.");return;}if(!confirm("Remove this week?"))return;setWeeksAndSave(p=>p.filter((_,j)=>j!==i));setActiveWeek(0);};

  const TH=(bg,ex={})=>({padding:"6px 4px",fontSize:"10px",fontWeight:"600",background:bg||"#1a2e50",color:"#fff",border:"1px solid rgba(255,255,255,0.15)",whiteSpace:"nowrap",textAlign:"center",position:"sticky",top:0,zIndex:5,backdropFilter:"none",...ex});
  const TD=(bg,ex={})=>({padding:"1px 4px",border:"0.5px solid rgba(0,0,0,0.08)",background:bg||"transparent",verticalAlign:"middle",fontSize:"11px",...ex});
  const TDc=(bg,ex={})=>({padding:"0px 4px",border:"0.5px solid rgba(0,0,0,0.08)",background:bg||"transparent",verticalAlign:"middle",fontSize:"11px",lineHeight:"1",...ex});
  const IN=(ex={})=>({width:"100%",border:"none",background:"transparent",fontSize:"11px",padding:"2px",color:"inherit",fontFamily:"inherit",fontWeight:"inherit",outline:"none",boxSizing:"border-box",...ex});
  const CELL=(bg,ex={})=>({padding:"4px 6px",border:"0.5px solid #e2e8f0",background:bg||"#fff",verticalAlign:"middle",fontSize:"11px",...ex});
  const INCEL=(ex={})=>({width:"100%",border:"none",background:"transparent",fontSize:"11px",padding:"1px 2px",color:"#111",fontFamily:"inherit",outline:"none",...ex});

  if(!appMode)return <LoginScreen onLogin={setAppMode}/>;

  if(loading)return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#0f1f3d",flexDirection:"column",gap:"16px"}}>
      <div className="spinning" style={{fontSize:"32px"}}>↻</div>
      <div style={{color:"#fff",fontSize:"14px",fontWeight:"600"}}>Loading from Google Sheets...</div>
      <div style={{color:"rgba(255,255,255,0.4)",fontSize:"11px"}}>This is the live data. One moment.</div>
    </div>
  );

  return(
  <div style={{fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",padding:"12px"}}>

    {/* ── PIN MODAL ── */}
    {showPinModal&&(
      <div className="modal-bg" onClick={()=>setShowPinModal(false)}>
        <div className="modal" onClick={e=>e.stopPropagation()}>
          <div style={{fontWeight:"700",fontSize:"16px",color:"#1a2e50",marginBottom:"16px"}}>🔐 Change PINs</div>
          {[["Admin PIN",ADMIN_PIN_KEY,"Full board access"],["Viewer PIN",VIEWER_PIN_KEY,"Read-only access"]].map(([label,key,hint])=>(
            <div key={key} style={{marginBottom:"16px"}}>
              <label style={{fontSize:"11px",fontWeight:"700",color:"#374151",display:"block",marginBottom:"5px"}}>{label} <span style={{color:"#9ca3af",fontWeight:"400"}}>({hint})</span></label>
              <input defaultValue={localStorage.getItem(key)||""} onBlur={e=>{localStorage.setItem(key,e.target.value);}} style={{width:"100%",padding:"8px 10px",border:"1px solid #d1d5db",borderRadius:"6px",fontSize:"14px",letterSpacing:"3px"}} placeholder="Enter new PIN"/>
            </div>
          ))}
          <div style={{display:"flex",justifyContent:"flex-end",gap:"8px"}}>
            <button onClick={()=>setShowPinModal(false)} style={{background:"#f1f5f9",color:"#374151",border:"1px solid #d1d5db",padding:"7px 16px",borderRadius:"6px",fontSize:"12px",cursor:"pointer"}}>Close</button>
            <button onClick={()=>{alert("PINs saved! They take effect on next login.");setShowPinModal(false);}} style={{background:"#2563eb",color:"#fff",border:"none",padding:"7px 16px",borderRadius:"6px",fontSize:"12px",fontWeight:"700",cursor:"pointer"}}>Save PINs</button>
          </div>
        </div>
      </div>
    )}

    {/* ── API KEY MODAL ── */}
    {showApiModal&&(
      <div className="modal-bg" onClick={()=>setShowApiModal(false)}>
        <div className="modal" onClick={e=>e.stopPropagation()}>
          <div style={{fontWeight:"700",fontSize:"16px",color:"#1a2e50",marginBottom:"8px"}}>⚙ Anthropic API Key</div>
          <div style={{fontSize:"11px",color:"#64748b",marginBottom:"14px"}}>Required for AI Rate Confirmation extraction. Your key is stored locally only.</div>
          <input value={apiKey} onChange={e=>{setApiKey(e.target.value);localStorage.setItem("fcbv2_apikey",e.target.value);}} style={{width:"100%",padding:"8px 10px",border:"1px solid #d1d5db",borderRadius:"6px",fontSize:"12px",fontFamily:"monospace",marginBottom:"14px"}} placeholder="sk-ant-..."/>
          <div style={{display:"flex",justifyContent:"flex-end",gap:"8px"}}>
            {apiKey&&<button onClick={()=>{setApiKey("");localStorage.removeItem("fcbv2_apikey");}} style={{background:"#fee2e2",color:"#dc2626",border:"1px solid #fca5a5",padding:"7px 14px",borderRadius:"6px",fontSize:"12px",cursor:"pointer"}}>Remove Key</button>}
            <button onClick={()=>setShowApiModal(false)} style={{background:"#2563eb",color:"#fff",border:"none",padding:"7px 16px",borderRadius:"6px",fontSize:"12px",fontWeight:"700",cursor:"pointer"}}>Done</button>
          </div>
        </div>
      </div>
    )}

    {/* ── RECOVER DATA MODAL ── */}
    {showRecover&&(
      <div className="modal-bg" onClick={()=>setShowRecover(false)}>
        <div className="modal" onClick={e=>e.stopPropagation()}>
          <div style={{fontWeight:"700",fontSize:"16px",color:"#dc2626",marginBottom:"8px"}}>🔧 Recover Data</div>
          <div style={{fontSize:"11px",color:"#64748b",marginBottom:"14px"}}>Export your current data as a backup, or import from a previous backup file.</div>
          <div style={{display:"flex",gap:"8px",flexWrap:"wrap",marginBottom:"14px"}}>
            <button onClick={()=>{const blob=new Blob([JSON.stringify({weeks,archive:archivedWeeks,savedAt:Date.now()},null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`freight-full-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();}} style={{background:"#2563eb",color:"#fff",border:"none",borderRadius:"6px",padding:"7px 14px",fontSize:"11px",fontWeight:"700",cursor:"pointer"}}>⬇ Export All Data</button>
            <label style={{background:"#059669",color:"#fff",borderRadius:"6px",padding:"7px 14px",fontSize:"11px",fontWeight:"700",cursor:"pointer"}}>
              ⬆ Import Backup
              <input type="file" accept=".json" style={{display:"none"}} onChange={e=>{
                const f=e.target.files[0];if(!f)return;
                const r=new FileReader();
                r.onload=ev=>{try{const d=JSON.parse(ev.target.result);const w=d.weeks||d;if(!Array.isArray(w)){alert("Invalid file");return;}if(!confirm(`Import ${w.length} week(s)?`))return;setWeeksAndSave(w);if(d.archive){setArchivedWeeks(d.archive);localStorage.setItem("fcbv2_archive",JSON.stringify(d.archive));}alert("✅ Imported!");setShowRecover(false);}catch{alert("Could not read file.");}};
                r.readAsText(f);e.target.value="";
              }}/>
            </label>
          </div>
          {archivedWeeks.length>0&&<div style={{marginBottom:"12px"}}>
            <div style={{fontSize:"11px",fontWeight:"700",color:"#374151",marginBottom:"8px"}}>📦 Archived Weeks ({archivedWeeks.length})</div>
            {archivedWeeks.map((w,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:"8px",padding:"6px 10px",background:"#f8fafc",borderRadius:"6px",marginBottom:"4px",border:"1px solid #e2e8f0"}}>

                <td style={CELL(bg)}><input value={row.broker||""} onChange={e=>updSub("localDeliveries",row.id,"broker",e.target.value)} style={INCEL()} placeholder="Broker" disabled={isViewer}/></td>
                <td style={CELL(bg)}><input value={row.loadNum||""} onChange={e=>updSub("localDeliveries",row.id,"loadNum",e.target.value)} style={INCEL()} placeholder="Load #" disabled={isViewer}/></td>
                <td style={CELL(bg)}><input value={row.datetime||""} onChange={e=>updSub("localDeliveries",row.id,"datetime",e.target.value)} style={INCEL()} placeholder="3/31/2026 8AM" disabled={isViewer}/></td>
                <td style={CELL(bg)}><select value={row.driver||""} onChange={e=>updSub("localDeliveries",row.id,"driver",e.target.value)} style={{...INCEL({cursor:isViewer?"not-allowed":"pointer"}),color:row.driver?"#065f46":"#9ca3af"}} disabled={isViewer}><option value="">— Driver —</option>{DRIVERS.map(d=><option key={d} value={d}>{d}</option>)}</select></td>
                <td style={CELL(bg)}><input value={row.notes||""} onChange={e=>updSub("localDeliveries",row.id,"notes",e.target.value)} style={INCEL()} placeholder="Notes" disabled={isViewer}/></td>
                <td style={CELL(bg)}><select value={row.status||""} onChange={e=>updSub("localDeliveries",row.id,"status",e.target.value)} style={{...INCEL({cursor:isViewer?"not-allowed":"pointer",fontWeight:"600"}),color:row.status==="Delivered"?"#166534":row.status==="In Transit"?"#5b21b6":"#374151"}} disabled={isViewer}><option value="">— Status —</option><option>Need to deliver</option><option>In Transit</option><option>Waiting Appointment</option><option>Delivered</option></select></td>
                <td style={CELL(bg,{textAlign:"center",padding:"2px"})}>{!isViewer&&<button onClick={()=>removeSub("localDeliveries",row.id)} style={{width:"20px",height:"20px",border:"1px solid #fca5a5",background:"#fee2e2",color:"#dc2626",borderRadius:"4px",fontSize:"13px",padding:0,lineHeight:1,cursor:"pointer"}}>×</button>}</td>
              </tr>
            );})}
          </tbody>
        </table>
        {!isViewer&&<div style={{padding:"8px 12px",background:"#ecfdf5",borderTop:"1px solid #d1fae5"}}>
          <button onClick={()=>addSub("localDeliveries",mkLocal)} style={{background:"#059669",color:"#fff",border:"none",borderRadius:"5px",padding:"4px 12px",fontSize:"11px",fontWeight:"600",cursor:"pointer"}}>+ Add Local Delivery</button>
        </div>}
      </div>
      )}

      {/* ── CROSSDOCK DROPS ── */}
      <div className="section-header" style={{background:"#7c3aed",marginTop:"10px",borderRadius:"6px 6px 0 0"}} onClick={()=>toggleSection("xdrop")}>
        <span>{week.openSections?.xdrop?"▼":"▶"}</span>
        <span style={{fontWeight:"700",fontSize:"13px"}}>Loads Dropped at Crossdock</span>
        <span style={{fontSize:"11px",opacity:.7,marginLeft:"auto"}}>{(week.crossdockDrops||[]).length} entries</span>
      </div>
      {week.openSections?.xdrop&&(
      <div style={{border:"1px solid #d1d5db",borderTop:"none",borderRadius:"0 0 8px 8px",overflowX:"auto"}}>
        <table style={{borderCollapse:"collapse",width:"100%",minWidth:"900px"}}>
          <colgroup><col style={{width:"160px"}}/><col style={{width:"130px"}}/><col style={{width:"100px"}}/><col style={{width:"100px"}}/><col style={{width:"130px"}}/><col style={{width:"130px"}}/><col style={{width:"110px"}}/><col style={{width:"100px"}}/><col style={{width:"28px"}}/></colgroup>
          <thead><tr>{["Location","Crossdock","Broker","Load #","Date / Time","Driver","Notes","Status",""].map((h,i)=><th key={i} style={TH("#7c3aed")}>{h}</th>)}</tr></thead>
          <tbody>
            {!(week.crossdockDrops||[]).length&&<tr><td colSpan={9} style={{padding:"16px",textAlign:"center",color:"#9ca3af",fontSize:"12px",background:"#f9fafb"}}>No crossdock drops</td></tr>}
            {(week.crossdockDrops||[]).map((row,i)=>{const bg=i%2===0?"#fff":"#faf5ff";return(
              <tr key={row.id} style={{borderBottom:"0.5px solid #e9d5ff"}}>
                <td style={CELL(bg)}><input value={row.location||""} onChange={e=>updSub("crossdockDrops",row.id,"location",e.target.value)} style={INCEL()} placeholder="Delivery city" disabled={isViewer}/></td>
                <td style={CELL(bg)}><input value={row.trailer||""} onChange={e=>updSub("crossdockDrops",row.id,"trailer",e.target.value)} style={INCEL()} placeholder="Crossdock name" disabled={isViewer}/></td>
                <td style={CELL(bg)}><input value={row.broker||""} onChange={e=>updSub("crossdockDrops",row.id,"broker",e.target.value)} style={INCEL()} placeholder="Broker" disabled={isViewer}/></td>
                <td style={CELL(bg)}><input value={row.loadNum||""} onChange={e=>updSub("crossdockDrops",row.id,"loadNum",e.target.value)} style={INCEL()} placeholder="Load #" disabled={isViewer}/></td>
                <td style={CELL(bg)}><input value={row.datetime||""} onChange={e=>updSub("crossdockDrops",row.id,"datetime",e.target.value)} style={INCEL()} placeholder="3/31/2026 8AM" disabled={isViewer}/></td>
                <td style={CELL(bg)}><input value={row.driver||""} onChange={e=>updSub("crossdockDrops",row.id,"driver",e.target.value)} style={INCEL()} placeholder="Driver / #" disabled={isViewer}/></td>
                <td style={CELL(bg)}><input value={row.notes||""} onChange={e=>updSub("crossdockDrops",row.id,"notes",e.target.value)} style={INCEL()} placeholder="Notes" disabled={isViewer}/></td>
                <td style={CELL(bg)}><select value={row.status||""} onChange={e=>updSub("crossdockDrops",row.id,"status",e.target.value)} style={{...INCEL({cursor:isViewer?"not-allowed":"pointer",fontWeight:"600"}),color:row.status==="Delivered"?"#166534":row.status==="In Transit"?"#5b21b6":"#374151"}} disabled={isViewer}><option value="">— Status —</option><option>Waiting Appointment</option><option>In Transit</option><option>Delivered</option></select></td>
                <td style={CELL(bg,{textAlign:"center",padding:"2px"})}>{!isViewer&&<button onClick={()=>removeSub("crossdockDrops",row.id)} style={{width:"20px",height:"20px",border:"1px solid #fca5a5",background:"#fee2e2",color:"#dc2626",borderRadius:"4px",fontSize:"13px",padding:0,lineHeight:1,cursor:"pointer"}}>×</button>}</td>
              </tr>
            );})}
          </tbody>
        </table>
        {!isViewer&&<div style={{padding:"8px 12px",background:"#faf5ff",borderTop:"1px solid #e9d5ff"}}>
          <button onClick={()=>addSub("crossdockDrops",mkXDrop)} style={{background:"#7c3aed",color:"#fff",border:"none",borderRadius:"5px",padding:"4px 12px",fontSize:"11px",fontWeight:"600",cursor:"pointer"}}>+ Add Crossdock Drop</button>
        </div>}
      </div>
      )}

      {/* ── ACCESSORIALS ── */}
      <div className="section-header" style={{background:"#b45309",marginTop:"10px",borderRadius:"6px 6px 0 0"}} onClick={()=>toggleSection("acc")}>
        <span>{week.openSections?.acc?"▼":"▶"}</span>
        <span style={{fontWeight:"700",fontSize:"13px"}}>Accessorials</span>
        <span style={{fontSize:"11px",opacity:.7,marginLeft:"auto"}}>{(week.accessorials||[]).length} entries{totAcc>0?` · Total: $${totAcc.toLocaleString()}`:""}</span>
      </div>
      {week.openSections?.acc&&(
      <div style={{border:"1px solid #d1d5db",borderTop:"none",borderRadius:"0 0 8px 8px",overflowX:"auto"}}>
        <table style={{borderCollapse:"collapse",width:"100%",minWidth:"600px"}}>
          <colgroup><col style={{width:"140px"}}/><col style={{width:"140px"}}/><col style={{width:"90px"}}/><col style={{width:"130px"}}/><col style={{width:"220px"}}/><col style={{width:"28px"}}/></colgroup>
          <thead><tr>{["Broker","Load #","Amount ($)","Type","Notes",""].map((h,i)=><th key={i} style={TH("#b45309")}>{h}</th>)}</tr></thead>
          <tbody>
            {!(week.accessorials||[]).length&&<tr><td colSpan={6} style={{padding:"16px",textAlign:"center",color:"#9ca3af",fontSize:"12px",background:"#f9fafb"}}>No accessorials</td></tr>}
            {(week.accessorials||[]).map((row,i)=>{const bg=i%2===0?"#fff":"#fffbeb";const tFg=row.type==="Detention"?"#b45309":row.type==="Lumper"?"#1e40af":row.type==="Layover"?"#166534":"#7c3aed";return(
              <tr key={row.id} style={{borderBottom:"0.5px solid #fde68a"}}>
                <td style={CELL(bg)}><input value={row.broker||""} onChange={e=>updSub("accessorials",row.id,"broker",e.target.value)} style={INCEL()} placeholder="Broker" disabled={isViewer}/></td>
                <td style={CELL(bg)}><input value={row.loadNum||""} onChange={e=>updSub("accessorials",row.id,"loadNum",e.target.value)} style={INCEL()} placeholder="Load #" disabled={isViewer}/></td>
                <td style={CELL(bg,{textAlign:"right"})}><div style={{display:"flex",alignItems:"center",gap:"2px"}}><span style={{color:"#b45309",fontWeight:"700"}}>$</span><input value={row.amount||""} type="number" onChange={e=>updSub("accessorials",row.id,"amount",e.target.value)} style={INCEL({textAlign:"right",fontWeight:"700",color:"#b45309"})} placeholder="0" disabled={isViewer}/></div></td>
                <td style={CELL(bg,{textAlign:"center"})}><select value={row.type||"Detention"} onChange={e=>updSub("accessorials",row.id,"type",e.target.value)} style={{...INCEL({textAlign:"center",cursor:isViewer?"not-allowed":"pointer",fontWeight:"700",color:tFg}),background:"transparent"}} disabled={isViewer}><option>Detention</option><option>Lumper</option><option>Layover</option><option>TONU</option><option>Other</option></select></td>
                <td style={CELL(bg)}><input value={row.notes||""} onChange={e=>updSub("accessorials",row.id,"notes",e.target.value)} style={INCEL()} placeholder="Notes" disabled={isViewer}/></td>
                <td style={CELL(bg,{textAlign:"center",padding:"2px"})}>{!isViewer&&<button onClick={()=>removeSub("accessorials",row.id)} style={{width:"20px",height:"20px",border:"1px solid #fca5a5",background:"#fee2e2",color:"#dc2626",borderRadius:"4px",fontSize:"13px",padding:0,lineHeight:1,cursor:"pointer"}}>×</button>}</td>
              </tr>
            );})}
            {(week.accessorials||[]).length>0&&(
              <tr style={{background:"#fff7ed",borderTop:"2px solid #fbbf24"}}>
                <td colSpan={2} style={CELL("#fff7ed",{fontWeight:"700",color:"#92400e",textAlign:"right"})}>Total:</td>
                <td style={CELL("#fff7ed",{textAlign:"right",fontWeight:"700",color:"#b45309",fontSize:"13px"})}>${totAcc.toLocaleString()}</td>
                <td colSpan={3} style={CELL("#fff7ed")}/>
              </tr>
            )}
          </tbody>
        </table>
        {!isViewer&&<div style={{padding:"8px 12px",background:"#fffbeb",borderTop:"1px solid #fde68a"}}>
          <button onClick={()=>addSub("accessorials",mkAcc)} style={{background:"#b45309",color:"#fff",border:"none",borderRadius:"5px",padding:"4px 12px",fontSize:"11px",fontWeight:"600",cursor:"pointer"}}>+ Add Accessorial</button>
        </div>}
      </div>
      )}
    </div>
    )}

    {/* ── STATS TAB ── */}
    {/* ── DRIVER ROSTER TAB ── */}
    {activeTab==="roster"&&!isViewer&&(
    <div style={{background:"#fff",border:"1px solid #d1d5db",borderTop:"none",borderRadius:"0 0 8px 8px",padding:"20px"}}>
      <div style={{fontWeight:"700",fontSize:"14px",color:"#1a2e50",marginBottom:"16px"}}>👥 Driver Roster</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:"8px"}}>
        {DRIVERS.map(name=>(
          <div key={name} style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:"8px",padding:"10px 14px",display:"flex",alignItems:"center",gap:"8px"}}>
            <span style={{fontSize:"18px"}}>🧑‍✈️</span>
            <span style={{fontSize:"12px",fontWeight:"600",color:"#1a2e50"}}>{name}</span>
          </div>
        ))}
      </div>
    </div>
    )}

    {/* ── CROSSDOCK ADDRESSES TAB ── */}
    {activeTab==="xdock"&&!isViewer&&(
    <div style={{background:"#fff",border:"1px solid #d1d5db",borderTop:"none",borderRadius:"0 0 8px 8px",padding:"20px"}}>
      <div style={{fontWeight:"700",fontSize:"14px",color:"#1a2e50",marginBottom:"16px"}}>🔁 Crossdock Partner Locations</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:"10px"}}>
        {XDOCK_ADDRESSES.map((x,i)=>(
          <div key={i} style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:"10px",padding:"12px 14px"}}>
            <div style={{fontWeight:"700",color:"#1a2e50",fontSize:"13px",marginBottom:"4px"}}>{x.city}</div>
            <div style={{color:"#475569",fontSize:"11px",marginBottom:"3px"}}>{x.addr}</div>
            <div style={{color:"#059669",fontWeight:"600",fontSize:"11px"}}>{x.contact}</div>
            {x.price&&<div style={{color:"#d97706",fontWeight:"600",fontSize:"10px",marginTop:"3px"}}>{x.price}</div>}
          </div>
        ))}
      </div>
    </div>
    )}

        {activeTab==="archive"&&!isViewer&&(
    <div style={{background:"#fff",border:"1px solid #d1d5db",borderTop:"none",borderRadius:"0 0 8px 8px",padding:"20px"}}>
      <div style={{fontWeight:"700",fontSize:"14px",color:"#4c1d95",marginBottom:"4px"}}>📦 Archived Weeks</div>
      <div style={{fontSize:"11px",color:"#64748b",marginBottom:"14px"}}>Weeks moved here from the main board. You can restore or permanently delete them.</div>
      {archivedWeeks.length===0?<div style={{textAlign:"center",padding:"40px",color:"#94a3b8",fontSize:"12px",border:"2px dashed #e2e8f0",borderRadius:"8px"}}>No archived weeks yet. Click 📦 on a week tab to archive it.</div>:archivedWeeks.map((w,i)=>(
        <div key={i} style={{border:"1px solid #e9d5ff",borderRadius:"10px",padding:"14px",marginBottom:"12px",background:"#faf5ff"}}>
          <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"10px"}}>
            <span style={{fontWeight:"700",fontSize:"13px",color:"#4c1d95",flex:1}}>{w.label}</span>
            <span style={{fontSize:"10px",color:"#94a3b8"}}>{w.archivedAt}</span>
            <button onClick={()=>{if(!confirm("Restore this week to the board?"))return;setWeeksAndSave(p=>[w,...p]);setArchivedWeeks(p=>{const n=p.filter((_,j)=>j!==i);localStorage.setItem("fcbv2_archive",JSON.stringify(n));return n;});setActiveTab("weeks");}} style={{background:"#eff6ff",color:"#2563eb",border:"1px solid #bfdbfe",borderRadius:"6px",padding:"4px 10px",fontSize:"11px",fontWeight:"600",cursor:"pointer"}}>Restore</button>
            <button onClick={()=>{if(!confirm("Permanently delete?"))return;setArchivedWeeks(p=>{const n=p.filter((_,j)=>j!==i);localStorage.setItem("fcbv2_archive",JSON.stringify(n));return n;});}} style={{background:"#fee2e2",color:"#dc2626",border:"1px solid #fca5a5",borderRadius:"6px",padding:"4px 10px",fontSize:"11px",fontWeight:"600",cursor:"pointer"}}>Delete</button>
          </div>
          <div style={{display:"flex",gap:"12px",flexWrap:"wrap",fontSize:"11px",color:"#6b7280"}}>
            <span>{(w.groups||[]).length} trailers</span>
            <span>{(w.groups||[]).flatMap(g=>g.loads||[]).length} loads</span>
            <span style={{fontWeight:"700",color:"#059669"}}>${(w.groups||[]).flatMap(g=>g.loads||[]).reduce((s,l)=>s+(parseFloat(l.rate)||0),0).toLocaleString()} gross</span>
          </div>
        </div>
      ))}
    </div>
    )}

        {activeTab==="stats"&&!isViewer&&(
    <div style={{background:"#fff",border:"1px solid #d1d5db",borderTop:"none",borderRadius:"0 0 8px 8px",padding:"20px"}}>
      <div style={{fontWeight:"700",fontSize:"14px",color:"#1a2e50",marginBottom:"16px"}}>📊 Statistics — All Weeks</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:"12px"}}>
        {[
          {label:"Total Trailers",value:weeks.reduce((s,w)=>s+(w.groups||[]).length,0),color:"#2563eb"},
          {label:"Total Loads",value:weeks.reduce((s,w)=>s+(w.groups||[]).flatMap(g=>g.loads||[]).length,0),color:"#7c3aed"},
          {label:"Total Gross",value:"$"+weeks.reduce((s,w)=>s+(w.groups||[]).flatMap(g=>g.loads||[]).reduce((s2,l)=>s2+(parseFloat(l.rate)||0),0),0).toLocaleString(),color:"#059669"},
        ].map(({label,value,color})=>(
          <div key={label} style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:"10px",padding:"16px",textAlign:"center"}}>
            <div style={{fontSize:"11px",color:"#64748b",fontWeight:"600",marginBottom:"6px"}}>{label}</div>
            <div style={{fontSize:"22px",fontWeight:"800",color}}>{value}</div>
          </div>
        ))}
      </div>
      <div style={{marginTop:"20px"}}>
        <table style={{borderCollapse:"collapse",width:"100%"}}>
          <thead><tr>{["Week","Trailers","Loads","Gross"].map(h=><th key={h} style={{padding:"8px",background:"#1a2e50",color:"#fff",fontSize:"11px",fontWeight:"600",textAlign:"left"}}>{h}</th>)}</tr></thead>
          <tbody>
            {weeks.map((w,i)=>{
              const grps=w.groups||[];
              const loads=grps.flatMap(g=>g.loads||[]);
              const gross=loads.reduce((s,l)=>s+(parseFloat(l.rate)||0),0);
              return(
                <tr key={w.id} style={{background:i%2===0?"#fff":"#f8fafc",borderBottom:"0.5px solid #e2e8f0"}}>
                  <td style={{padding:"8px",fontSize:"12px",fontWeight:"600",color:"#1a2e50"}}>{w.label}</td>
                  <td style={{padding:"8px",fontSize:"12px"}}>{grps.length}</td>
                  <td style={{padding:"8px",fontSize:"12px"}}>{loads.length}</td>
                  <td style={{padding:"8px",fontSize:"12px",fontWeight:"700",color:"#059669"}}>${gross.toLocaleString()}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
    )}

  </div>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
