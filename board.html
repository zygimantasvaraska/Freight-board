function cityMiles(s){if(!s)return null;const c=s.split(",")[0].trim().toLowerCase();if(DIST[c]!==undefined)return DIST[c];for(const k of Object.keys(DIST))if((c.includes(k)||k.includes(c))&&k.length>4)return DIST[k];return null;}

function parseTS(s=""){const dm=s.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);if(!dm)return Infinity;const d=new Date(+dm[3],+dm[1]-1,+dm[2]);const tm=s.match(/(\d+):?(\d*)\s*(AM|PM)/i);if(tm){let h=+tm[1],m=+(tm[2]||0);if(tm[3].toUpperCase()==="PM"&&h!==12)h+=12;if(tm[3].toUpperCase()==="AM"&&h===12)h=0;d.setHours(h,m);}else{d.setHours(0,0,0,0);}return d.getTime();}

function calcGroup(g){
  const loads=g.loads.map(l=>{const{s,r}=parseSR(l.sr);const am=cityMiles(s);const um=(l.manualPickupMi!==""&&l.manualPickupMi!=null)?parseFloat(l.manualPickupMi):am;return{...l,shipper:s,receiver:r,pickupMiAuto:am,pickupMiUsed:um,localCharge:l.manualLocalCharge!==""&&l.manualLocalCharge!=null?parseFloat(l.manualLocalCharge):localCharge(um),tripPrice:parseFloat(l.rate)||0};});

  const so={};sd.forEach((l,i)=>{so[l.id]=i+1;});

  return{...g,calcTripMi:tm,autoTripMi:autoMi||null,rcvrs,rpm,gross,loc,loads:sd.map(l=>({...l,stop:so[l.id]??null}))};
}

async function sheetsLoad(){const r=await fetch(SHEETS_URL,{redirect:"follow"});if(!r.ok)throw new Error("HTTP "+r.status);return r.json();}
async function sheetsSave(data){await fetch(SHEETS_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({data:{...data,savedAt:Date.now()}})});}
</script>

<script type="text/babel">const {useState,useEffect,useRef,useMemo,Fragment,useCallback}=React;

    if(pin===viewerPin){onLogin("viewer",null);return;}

          <div className="login-logo">Freight Board</div>
          <div className="login-sub">Romeoville, IL Hub · Restricted Access</div>
        </div>
        {!mode?(
          <>
            <button className="mode-btn" onClick={()=>setMode("admin")} style={{justifyContent:"center"}}><div className="mode-icon" style={{background:"#1e3a5f"}}>🔐</div><div style={{textAlign:"center"}}><div style={{fontSize:"13px",fontWeight:"700",color:"#0f1f3d"}}>Admin Access</div></div></button>
            <button className="mode-btn" onClick={()=>setMode("dispatcher")} style={{justifyContent:"center"}}><div className="mode-icon" style={{background:"#1e3a5f",fontSize:"15px"}}>🎯</div><div style={{textAlign:"center"}}><div style={{fontSize:"13px",fontWeight:"700",color:"#0f1f3d"}}>Dispatcher</div></div></button>
            <button className="mode-btn" onClick={()=>setMode("viewer")} style={{justifyContent:"center"}}><div className="mode-icon" style={{background:"#064e3b"}}>👁</div><div style={{textAlign:"center"}}><div style={{fontSize:"13px",fontWeight:"700",color:"#0f1f3d"}}>View Board</div></div></button>
          </>
        ):(
          <div className="fade-in">
            <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"16px"}}>
              <button onClick={()=>{setMode(null);setPin("");setErr("");}} style={{background:"#f1f5f9",border:"1px solid #e2e8f0",borderRadius:"6px",padding:"4px 10px",fontSize:"11px",fontWeight:"600",color:"#475569",cursor:"pointer"}}>← Back</button>
              <span style={{fontSize:"13px",fontWeight:"700",color:"#0f1f3d"}}>{mode==="admin"?"Admin PIN":mode==="dispatcher"?"Dispatcher PIN":"Viewer PIN"}</span>
            </div>
            {mode==="dispatcher"&&<div style={{fontSize:"11px",color:"#64748b",marginBottom:"8px",textAlign:"center"}}>Enter your personal dispatcher PIN</div>}
            <input ref={inputRef} type="password" className="pin-input" value={pin} onChange={e=>setPin(e.target.value)} onKeyDown={e=>e.key==="Enter"&&attempt()} placeholder="••••" maxLength={20} autoComplete="off"/>
            {err&&<div className="pin-error">{err}</div>}
            <button className="login-btn" onClick={attempt}>{mode==="admin"?"Enter Admin Mode":mode==="dispatcher"?"Dispatcher Login →":"View Board →"}</button>
          </div>
        )}
      </div>
    </div>
  );
}

function App(){
  const[appMode,setAppMode]=useState(null);
  const[weeks,setWeeks]=useState([]);
  const[activeWeek,setActiveWeek]=useState(0);
  const[activeTab,setActiveTab]=useState("weeks");
  const[saveStatus,setSaveStatus]=useState("idle");
  const[loading,setLoading]=useState(true);

  const[notifications,setNotifications]=useState([]);
  const[showNotif,setShowNotif]=useState(false);
  const[archivedWeeks,setArchivedWeeks]=useState(()=>{try{return JSON.parse(localStorage.getItem("fcbv2_archive")||"[]");}catch{return[];}});
  const[customDrivers,setCustomDrivers]=useState([]);
  const[customTrucks,setCustomTrucks]=useState([]);
  const[customTrailers,setCustomTrailers]=useState([]);
  const allDrivers=useMemo(()=>[...DRIVERS,...customDrivers].sort(),[customDrivers]);
  const allTrucks=useMemo(()=>[...TRUCK_NUMBERS,...customTrucks].filter((v,i,a)=>a.indexOf(v)===i).sort((a,b)=>a.localeCompare(b,undefined,{numeric:true})),[customTrucks]);
  const allTrailers=useMemo(()=>[...TRAILER_NUMBERS,...customTrailers].filter((v,i,a)=>a.indexOf(v)===i).sort((a,b)=>a.localeCompare(b,undefined,{numeric:true})),[customTrailers]);
  const[dispatchers,setDispatchers]=useState(()=>{try{return JSON.parse(localStorage.getItem(DISPATCHERS_KEY)||"[]");}catch{return[];}});
  const[currentDispatcher,setCurrentDispatcher]=useState(null);
  const saveTimer=useRef(null);
  const [dragWeekIdx,setDragWeekIdx]=React.useState(null);
  const [loginLog,setLoginLog]=React.useState(()=>{try{return JSON.parse(localStorage.getItem("fcbv2_loginlog")||"[]");}catch(e){return [];}});
  const [dragWeekOverIdx,setDragWeekOverIdx]=React.useState(null);
  const [driverSearch,setDriverSearch]=useState("");
  const activityLog=React.useRef([]);
  const sessionStart=React.useRef(Date.now());
  const fieldCounts=React.useRef({});
  const sectionTime=React.useRef({});
  const lastSection=React.useRef(null);
  const lastSectionStart=React.useRef(Date.now());
  const [selectedDriver,setSelectedDriver]=useState(null);
  const [photoModal,setPhotoModal]=useState(null);
  const [photoViewer,setPhotoViewer]=useState(null);
  const apiKeyRef=useRef(apiKey);
  useEffect(()=>{apiKeyRef.current=apiKey;},[apiKey]);
  const isAdmin=appMode==="admin";
  const trackField=(field)=>{
    fieldCounts.current[field]=(fieldCounts.current[field]||0)+1;
    activityLog.current.push({ts:Date.now(),field});
    if(activityLog.current.length>1000)activityLog.current=activityLog.current.slice(-500);
    try{localStorage.setItem("fcbv2_activity",JSON.stringify({log:activityLog.current.slice(-200),fields:fieldCounts.current,sessions:(JSON.parse(localStorage.getItem("fcbv2_activity")||"{}").sessions||0)+0}));}catch(e){}
  };
  const isViewer=appMode==="viewer";
  const isDispatcher=appMode==="dispatcher";
  const saveDispatchers=(list)=>{
    localStorage.setItem(DISPATCHERS_KEY,JSON.stringify(list));
    setDispatchers(list);
    saveToSheets({weeks,customDrivers,customTrucks,customTrailers,dispatchers:list});
  };
  const myDrivers=useMemo(()=>{
    if(!isDispatcher||!currentDispatcher)return new Set();
    return new Set(currentDispatcher.drivers||[]);
  },[isDispatcher,currentDispatcher]);
  const canSeeBroker=(group,load)=>{
    if(isAdmin)return true;
    if(isViewer)return false;
    if(isDispatcher){
      const assignedDriver=load.driver||group.groupDriver||"";
      return assignedDriver&&myDrivers.has(assignedDriver);
    }
    return false;
  };
  const[searchQuery,setSearchQuery]=useState("");
  const[showSearch,setShowSearch]=useState(false);
  const[searchResults,setSearchResults]=useState([]);
  const[searchIdx,setSearchIdx]=useState(0);
  const searchRef=useRef(null);
  const[showLegend,setShowLegend]=useState(false);
  const[showSummary,setShowSummary]=useState(false);
  const[showHdrMenu,setShowHdrMenu]=useState(false);
  const dragGroupIdx=useRef(null);
  const[dragOverIdx,setDragOverIdx]=useState(null);

  const today=useMemo(()=>{const d=new Date();d.setHours(0,0,0,0);return d;},[]);
  const tomorrow=useMemo(()=>{const d=new Date(today);d.setDate(d.getDate()+1);return d;},[today]);

  useEffect(()=>{
    if(lastSection.current){
      const spent=Date.now()-lastSectionStart.current;
      sectionTime.current[lastSection.current]=(sectionTime.current[lastSection.current]||0)+spent;
    }
    lastSection.current=activeTab;
    lastSectionStart.current=Date.now();
  },[activeTab]);

  useEffect(()=>{
    if(!appMode)return;
    setLoading(true);
    sheetsLoad()
      .then(data=>{
        const rawWeeks=Array.isArray(data)?data:(data.weeks||[]);
        if(rawWeeks.length>0){
          setWeeks(rawWeeks);
          if(data.customDrivers)setCustomDrivers(data.customDrivers);
          if(data.customTrucks)setCustomTrucks(data.customTrucks);
          if(data.customTrailers)setCustomTrailers(data.customTrailers);
          if(data.dispatchers&&data.dispatchers.length>0){setDispatchers(data.dispatchers);localStorage.setItem(DISPATCHERS_KEY,JSON.stringify(data.dispatchers));}
        } else {
          try{
            const local=JSON.parse(localStorage.getItem("fcbv2_localdata")||"{}");
            if(local.weeks&&local.weeks.length>0){
              setWeeks(local.weeks);
              if(local.customDrivers)setCustomDrivers(local.customDrivers);
              if(local.customTrucks)setCustomTrucks(local.customTrucks);
              if(local.customTrailers)setCustomTrailers(local.customTrailers);
              if(local.dispatchers)setDispatchers(local.dispatchers);
            } else {setWeeks([mkWeek("Week of "+new Date().toLocaleDateString("en-US"))]);}
          }catch(e){setWeeks([mkWeek("Week of "+new Date().toLocaleDateString("en-US"))]);}
        }
        setLoading(false);
      })
      .catch(()=>{
        try{
          const local=JSON.parse(localStorage.getItem("fcbv2_localdata")||"{}");
          if(local.weeks&&local.weeks.length>0){
            setWeeks(local.weeks);
            if(local.customDrivers)setCustomDrivers(local.customDrivers);
            if(local.customTrucks)setCustomTrucks(local.customTrucks);
            if(local.customTrailers)setCustomTrailers(local.customTrailers);
            if(local.dispatchers)setDispatchers(local.dispatchers);
          } else {setWeeks([mkWeek(new Date().toLocaleDateString("en-US",{month:"numeric",day:"numeric",year:"numeric"}))]);}
        }catch(e){setWeeks([mkWeek(new Date().toLocaleDateString("en-US",{month:"numeric",day:"numeric",year:"numeric"}))]);}
        setLoading(false);setSaveStatus("error");
      });
  },[appMode]);

  useEffect(()=>{
    const handler=(e)=>{
      if((e.ctrlKey||e.metaKey)&&e.key==="f"){e.preventDefault();setShowSearch(s=>{if(!s)setTimeout(()=>searchRef.current?.focus(),50);return true;});}
      if(e.key==="Escape"){setShowSearch(false);setShowHdrMenu(false);setShowSummary(false);}
    };
    window.addEventListener("keydown",handler);
    return()=>window.removeEventListener("keydown",handler);
  },[]);

  useEffect(()=>{
    if(!searchQuery.trim()){setSearchResults([]);setSearchIdx(0);return;}
    const q=searchQuery.toLowerCase().trim();const results=[];
    weeks.forEach((w,wi)=>{
      (w.groups||[]).forEach((g,gi)=>{
        (g.loads||[]).forEach((l,li)=>{
          const fields=[l.sr,l.pickup,l.delivery,l.product,l.driver,l.status,l.notes,g.groupDriver,...(isAdmin?[l.broker,l.loadNum||""]:[])].join(" ").toLowerCase();
          if(fields.includes(q)){results.push({weekIdx:wi,weekLabel:w.label,groupId:g.id,loadId:l.id,sr:l.sr,broker:(isAdmin||canSeeBroker(g,l))?l.broker:null,pickup:l.pickup,delivery:l.delivery,driver:g.groupDriver||l.driver,status:l.status});}
        });
        (w.localDeliveries||[]).forEach(r=>{const fields=[r.destination,r.driver,r.datetime,r.status,...(isAdmin?[r.broker,r.loadNum]:[])].join(" ").toLowerCase();if(fields.includes(q))results.push({weekIdx:wi,weekLabel:w.label,groupId:null,loadId:r.id,sr:r.destination,broker:r.broker+" #"+r.loadNum,pickup:r.datetime,delivery:"Local",driver:r.driver,status:r.status});});
        (w.crossdockDrops||[]).forEach(r=>{const fields=[r.location,r.driver,r.datetime,r.status,...(isAdmin?[r.broker,r.loadNum]:[])].join(" ").toLowerCase();if(fields.includes(q))results.push({weekIdx:wi,weekLabel:w.label,groupId:null,loadId:r.id,sr:r.location,broker:r.broker+" #"+r.loadNum,pickup:r.datetime,delivery:"Crossdock",driver:r.driver,status:r.status});});
      });
    });
    setSearchResults(results);setSearchIdx(0);
  },[searchQuery,weeks]);

  useEffect(()=>{
    if(!appMode||isViewer)return;
    const check=()=>{const now=Date.now();const notifs=[];weeks.forEach(w=>{(w.groups||[]).forEach(g=>{(g.loads||[]).forEach(l=>{if(l.status)return;const ts=parseTS(l.pickup);if(ts===Infinity)return;const diff=ts-now;if(diff>0&&diff<2*3600000){notifs.push({id:l.id,sr:l.sr,pickup:l.pickup,week:w.label});}});});});setNotifications(notifs);};
    check();const interval=setInterval(check,60000);return()=>clearInterval(interval);
  },[weeks,appMode,isViewer]);

  const handleRateCon=async(file,groupId)=>{
    const key=apiKeyRef.current;if(!key){alert("Please add your Anthropic API key first.");return;}
    setRcLoading(p=>({...p,[groupId]:true}));
    try{
      const base64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file);});
      const mediaType=file.type||"application/pdf";
      const response=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-opus-4-6",max_tokens:1000,messages:[{role:"user",content:[{type:mediaType==="application/pdf"?"document":"image",source:{type:"base64",media_type:mediaType,data:base64}},{type:"text",text:`Extract from this rate confirmation: shipper city+state, receiver city+state, pickup date/time, delivery date/time, product/commodity, pallets, weight, rate amount, broker name, load number. Return JSON only: {"shipper":"","receiver":"","pickup":"","delivery":"","product":"","pallets":"","weight":"","rate":"","broker":"","loadNum":""}`}]}]})});
      const data=await response.json();const text=data.content?.[0]?.text||"";const match=text.match(/\{[\s\S]*\}/);if(!match)throw new Error("No JSON");
      const parsed=JSON.parse(match[0]);const sr=`${parsed.shipper||""} - ${parsed.receiver||""}`.trim().replace(/^-\s*|-\s*$/g,"");
      const brokerStr=parsed.broker&&parsed.loadNum?`${parsed.broker} & ${parsed.loadNum}`:parsed.broker||parsed.loadNum||"";
      setWeeksAndSave(p=>p.map((w,i)=>i!==activeWeek?w:{...w,groups:w.groups.map(g=>{if(g.id!==groupId)return g;const newLoad=mkLoad({sr,broker:brokerStr,pickup:parsed.pickup||"",delivery:parsed.delivery||"",product:parsed.product||"",pallets:parsed.pallets||"",weight:parsed.weight||"",rate:parsed.rate||""});return{...g,loads:[...g.loads,newLoad]};})}));
    }catch(e){alert("Could not read rate confirmation: "+e.message);}
    setRcLoading(p=>({...p,[groupId]:false}));
  };

  const archiveWeek=(weekIdx)=>{

    const newArchive=[entry,...archivedWeeks];setArchivedWeeks(newArchive);localStorage.setItem("fcbv2_archive",JSON.stringify(newArchive));
    setWeeksAndSave(p=>p.filter((_,i)=>i!==weekIdx));setActiveWeek(0);
  };

  const LS_KEY="fcbv2_localdata";

    const isArr=Array.isArray(data);

    const ct=isArr?customTrucks:(data.customTrucks!==undefined?data.customTrucks:customTrucks);

  },[]);

  const setWeeksAndSave=useCallback((updater)=>{setWeeks(prev=>{const next=typeof updater==="function"?updater(prev):updater;saveToSheets(next);return next;});},[saveToSheets]);

  const week=weeks[Math.min(activeWeek,weeks.length-1)];

  const allLoads=computed.flatMap(g=>g.loads);

  const pendingGroups=[...computed.filter(g=>g.groupStatus!=="In Transit"&&g.groupStatus!=="Delivered")].sort((a,b)=>Math.min(...a.loads.map(l=>parseTS(l.pickup)))-Math.min(...b.loads.map(l=>parseTS(l.pickup))));
  const otrGroups=computed.filter(g=>g.groupStatus==="In Transit"||g.groupStatus==="Delivered");
  const cToday=allLoads.filter(l=>{const pd=parsePickupDate(l.pickup);return pd&&pd.getTime()===today.getTime()&&!l.status;}).length;
  const cTomorrow=allLoads.filter(l=>{const pd=parsePickupDate(l.pickup);return pd&&pd.getTime()===tomorrow.getTime()&&!l.status;}).length;
  const cFuture=allLoads.filter(l=>{const pd=parsePickupDate(l.pickup);return pd&&pd.getTime()>tomorrow.getTime()&&!l.status;}).length;
  const cDelToday=allLoads.filter(l=>{const pd=parsePickupDate(l.delivery);return pd&&pd.getTime()===today.getTime();}).length;
  const cDelTomorrow=allLoads.filter(l=>{const pd=parsePickupDate(l.delivery);return pd&&pd.getTime()===tomorrow.getTime();}).length;
  const cDelivered=allLoads.filter(l=>l.status==="Delivered").length;
  const cLocalToday=(week?.localDeliveries||[]).filter(r=>{const pd=parsePickupDate(r.datetime);return pd&&pd.getTime()===today.getTime();}).length;
  const cLocalTomorrow=(week?.localDeliveries||[]).filter(r=>{const pd=parsePickupDate(r.datetime);return pd&&pd.getTime()===tomorrow.getTime();}).length;
  const cCrossdock=(week?.crossdockDrops||[]).filter(r=>r.status!=="Delivered").length;
  const wagesBase=computed.filter(g=>g.loads.length>1).reduce((s,g)=>{const rates=g.loads.map(l=>l.tripPrice).sort((a,b)=>b-a);return s+rates.slice(1).reduce((x,r)=>x+r,0);},0);
  const overallRPM=(()=>{const totalMi=computed.reduce((s,g)=>s+(g.calcTripMi||0),0);const net=totGross-totLocal;return totalMi>0?+((net/totalMi).toFixed(2)):null;})();

  const setW=(f,v)=>setWeeksAndSave(p=>p.map((w,i)=>i!==activeWeek?w:{...w,[f]:v}));
  const toggleSection=k=>setW("openSections",{...week.openSections,[k]:!week.openSections?.[k]});
  const setLoad=(gid,lid,f,v)=>setW("groups",week.groups.map(g=>g.id!==gid?g:{...g,loads:g.loads.map(l=>l.id!==lid?l:{...l,[f]:v})}));
  const setGroup=(gid,f,v)=>setW("groups",week.groups.map(g=>g.id!==gid?g:{...g,[f]:v}));
  const addLoad=gid=>setW("groups",week.groups.map(g=>g.id!==gid?g:{...g,loads:[...g.loads,mkLoad()]}));
  const removeLoad=(gid,lid)=>setW("groups",week.groups.map(g=>{if(g.id!==gid)return g;const ls=g.loads.filter(l=>l.id!==lid);return{...g,loads:ls.length?ls:[mkLoad()]};}));

  const removeGroup=gid=>{if(week.groups.length>1)setW("groups",week.groups.filter(g=>g.id!==gid));};
  const updSub=(sec,id,f,v)=>setW(sec,(week[sec]||[]).map(r=>r.id!==id?r:{...r,[f]:v}));

  const addWeek=()=>{const l=prompt("Week label (e.g. 3.30.2026 - 4.6.2026)");if(!l)return;setWeeksAndSave(p=>[...p,mkWeek(l)]);setActiveWeek(weeks.length);};
  const removeWeek=i=>{if(weeks.length<=1){alert("Cannot remove last week.");return;}if(!confirm("Remove this week?"))return;setWeeksAndSave(p=>p.filter((_,j)=>j!==i));setActiveWeek(0);};

  const TH=(bg,ex={})=>({padding:"6px 4px",fontSize:"10px",fontWeight:"600",background:bg||"#1a2e50",color:"#fff",border:"1px solid rgba(255,255,255,0.15)",whiteSpace:"nowrap",textAlign:"center",position:"sticky",top:0,zIndex:5,...ex});
  const TD=(bg,ex={})=>({padding:"2px 5px",border:"0.5px solid #c7d9f0",background:bg||"transparent",verticalAlign:"middle",fontSize:"12px",fontWeight:"500",...ex});
  const TDc=(bg,ex={})=>({padding:"0px 5px",border:"0.5px solid #c7d9f0",background:bg||"transparent",verticalAlign:"middle",fontSize:"12px",fontWeight:"500",lineHeight:"1",...ex});
  const IN=(ex={})=>({width:"100%",border:"none",background:"transparent",fontSize:"12px",fontWeight:"600",padding:"2px",color:"inherit",fontFamily:"inherit",outline:"none",boxSizing:"border-box",...ex});
  const CELL=(bg,ex={})=>({padding:"4px 6px",border:"0.5px solid #e2e8f0",background:bg||"#fff",verticalAlign:"middle",fontSize:"11px",...ex});
  const INCEL=(ex={})=>({width:"100%",border:"none",background:"transparent",fontSize:"11px",padding:"1px 2px",color:"#111",fontFamily:"inherit",outline:"none",...ex});

  if(!appMode)return <LoginScreen onLogin={(mode,disp)=>{

lers(updated);saveToSheets({weeks,customDrivers,customTrucks,customTrailers:updated});}} style={{background:"#fee2e2",border:"1px solid #fca5a5",color:"#dc2626",borderRadius:"3px",padding:"0 5px",fontSize:"11px",cursor:"pointer",lineHeight:"16px"}}>×</button></div>))}</div><div style={{borderTop:"1px solid #e2e8f0",marginBottom:"8px"}}/></div>}<div style={{display:"flex",flexWrap:"wrap",gap:"6px"}}>{TRAILER_NUMBERS.map(t=>(<div key={t} style={{background:"#faf5ff",border:"1px solid #e9d5ff",borderRadius:"6px",padding:"5px 10px"}}><span style={{fontSize:"12px",fontWeight:"600",color:"#7c3aed"}}>#{t}</span></div>))}</div></div></div>)}

                      <div style={{fontSize:"9px",color:"#94a3b8"}}>done</div>
                    </div>}
                  </div>
                );
              })}
            </div>
            {filtered.length===0&&<div style={{textAlign:"center",padding:"30px",color:"#94a3b8",fontSize:"13px"}}>No drivers match "{driverSearch}"</div>}
          </div>
        );
      })()}
    </div>
  )}

    {/* CROSSDOCK ADDRESSES TAB */}
    {activeTab==="xdock"&&(isAdmin||isDispatcher)&&(<div style={{background:"#fff",border:"1px solid #d1d5db",borderTop:"none",borderRadius:"0 0 8px 8px",padding:"20px"}}><div style={{fontWeight:"700",fontSize:"14px",color:"#1a2e50",marginBottom:"16px"}}>🔁 Crossdock Partner Locations</div><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:"10px"}}>{XDOCK_ADDRESSES.map((x,i)=>(<div key={i} style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:"10px",padding:"12px 14px"}}><div style={{fontWeight:"700",color:"#1a2e50",fontSize:"13px",marginBottom:"4px"}}>{x.city}</div><div style={{color:"#475569",fontSize:"11px",marginBottom:"3px"}}>{x.addr}</div><div style={{color:"#059669",fontWeight:"600",fontSize:"11px"}}>{x.contact}</div>{x.price&&<div style={{color:"#d97706",fontWeight:"600",fontSize:"10px",marginTop:"3px"}}>{x.price}</div>}</div>))}</div></div>)}

    {/* ARCHIVE TAB */}
    {activeTab==="archive"&&isAdmin&&(<div style={{background:"#fff",border:"1px solid #d1d5db",borderTop:"none",borderRadius:"0 0 8px 8px",padding:"20px"}}><div style={{fontWeight:"700",fontSize:"14px",color:"#4c1d95",marginBottom:"4px"}}>📦 Archived Weeks</div><div style={{fontSize:"11px",color:"#64748b",marginBottom:"14px"}}>Weeks moved here from the main board.</div>{archivedWeeks.length===0?<div style={{textAlign:"center",padding:"40px",color:"#94a3b8",fontSize:"12px",border:"2px dashed #e2e8f0",borderRadius:"8px"}}>No archived weeks yet. Click 📦 on a week tab to archive it.</div>:archivedWeeks.map((w,i)=>(<div key={i} style={{border:"1px solid #e9d5ff",borderRadius:"10px",padding:"14px",marginBottom:"12px",background:"#faf5ff"}}><div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"10px"}}><span style={{fontWeight:"700",fontSize:"13px",color:"#4c1d95",flex:1}}>{w.label}</span><span style={{fontSize:"10px",color:"#94a3b8"}}>{w.archivedAt}</span><button onClick={()=>{if(!confirm("Restore?"))return;setWeeksAndSave(p=>[w,...p]);setArchivedWeeks(p=>{const n=p.filter((_,j)=>j!==i);localStorage.setItem("fcbv2_archive",JSON.stringify(n));return n;});setActiveTab("weeks");}} style={{background:"#eff6ff",color:"#2563eb",border:"1px solid #bfdbfe",borderRadius:"6px",padding:"4px 10px",fontSize:"11px",fontWeight:"600",cursor:"pointer"}}>Restore</button><button onClick={()=>{if(!confirm("Permanently delete?"))return;setArchivedWeeks(p=>{const n=p.filter((_,j)=>j!==i);localStorage.setItem("fcbv2_archive",JSON.stringify(n));return n;});}} style={{background:"#fee2e2",color:"#dc2626",border:"1px solid #fca5a5",borderRadius:"6px",padding:"4px 10px",fontSize:"11px",fontWeight:"600",cursor:"pointer"}}>Delete</button></div><div style={{display:"flex",gap:"12px",flexWrap:"wrap",fontSize:"11px",color:"#6b7280"}}><span>{(w.groups||[]).length} trailers</span><span>{(w.groups||[]).flatMap(g=>g.loads||[]).length} loads</span><span style={{fontWeight:"700",color:"#059669"}}>${(w.groups||[]).flatMap(g=>g.loads||[]).reduce((s,l)=>s+(parseFloat(l.rate)||0),0).toLocaleString()} gross</span></div></div>))}</div>)}

    {/* INSIGHTS TAB */}
    {activeTab==="insights"&&isAdmin&&(
      <div style={{background:"#fff",border:"1px solid #d1d5db",borderTop:"none",borderRadius:"0 0 8px 8px",padding:"20px"}}>
        <div style={{fontWeight:"700",fontSize:"14px",color:"#0891b2",marginBottom:"16px"}}>🧠 Workflow Insights</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"20px"}}>
          <div>
            <div style={{fontWeight:"700",fontSize:"12px",color:"#374151",marginBottom:"10px"}}>⏱ Time by Section</div>
            {Object.entries(sectionTime.current).sort((a,b)=>b[1]-a[1]).map((item)=>{
              const total=Object.values(sectionTime.current).reduce((s,v)=>s+v,0)||1;
              const pct=Math.round(item[1]/total*100);
              const mins=Math.round(item[1]/60000);
              return(
                <div key={item[0]} style={{marginBottom:"8px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:"11px",marginBottom:"2px"}}>
                    <span style={{fontWeight:"600",textTransform:"capitalize"}}>{item[0]}</span>
                    <span style={{color:"#64748b"}}>{mins}m · {pct}%</span>
                  </div>
                  <div style={{height:"6px",background:"#e2e8f0",borderRadius:"3px"}}>
                    <div style={{height:"100%",width:pct+"%",background:"#0891b2",borderRadius:"3px"}}/>
                  </div>
                </div>
              );
            })}
            {Object.keys(sectionTime.current).length===0&&<div style={{color:"#94a3b8",fontSize:"12px"}}>Navigate tabs to start tracking</div>}
          </div>
          <div>
            <div style={{fontWeight:"700",fontSize:"12px",color:"#374151",marginBottom:"10px"}}>✏️ Most Edited Fields</div>
            {Object.entries(fieldCounts.current).sort((a,b)=>b[1]-a[1]).slice(0,8).map((item)=>{
              const maxVal=Math.max(...Object.values(fieldCounts.current))||1;
              const labels={"sr":"Shipper/Receiver","rate":"Rate","driver":"Driver","status":"Status","pickup":"Pickup","delivery":"Delivery","product":"Product","broker":"Broker"};
              return(
                <div key={item[0]} style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"6px"}}>
                  <span style={{fontSize:"11px",minWidth:"120px"}}>{labels[item[0]]||item[0]}</span>
                  <div style={{flex:1,height:"6px",background:"#e2e8f0",borderRadius:"3px"}}>
                    <div style={{height:"100%",width:Math.round(item[1]/maxVal*100)+"%",background:"#7c3aed",borderRadius:"3px"}}/>
                  </div>
                  <span style={{fontSize:"11px",color:"#64748b"}}>{item[1]}</span>
                </div>
              );
            })}
            {Object.keys(fieldCounts.current).length===0&&<div style={{color:"#94a3b8",fontSize:"12px"}}>Edit fields to start tracking</div>}
          </div>
        </div>
        <div style={{marginTop:"14px",fontSize:"11px",color:"#64748b",textAlign:"center"}}>
          Session: {Math.round((Date.now()-sessionStart.current)/60000)}m · {activityLog.current.length} edits
          <button onClick={()=>{activityLog.current=[];fieldCounts.current={};sectionTime.current={};try{localStorage.removeItem("fcbv2_activity");}catch(e){}}} style={{marginLeft:"12px",background:"#fee2e2",color:"#dc2626",border:"1px solid #fca5a5",borderRadius:"4px",padding:"2px 8px",fontSize:"10px",cursor:"pointer"}}>Clear</button>
        </div>
      </div>
    )}

    {/* STATS TAB */}
    {activeTab==="stats"&&(isAdmin||isDispatcher)&&(<div style={{background:"#fff",border:"1px solid #d1d5db",borderTop:"none",borderRadius:"0 0 8px 8px",padding:"20px"}}><div style={{fontWeight:"700",fontSize:"14px",color:"#1a2e50",marginBottom:"16px"}}>📊 Statistics — All Weeks</div><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:"12px"}}>{[{label:"Total Trailers",value:weeks.reduce((s,w)=>s+(w.groups||[]).length,0),color:"#2563eb"},{label:"Total Loads",value:weeks.reduce((s,w)=>s+(w.groups||[]).flatMap(g=>g.loads||[]).length,0),color:"#7c3aed"},{label:"Total Gross",value:"$"+weeks.reduce((s,w)=>s+(w.groups||[]).flatMap(g=>g.loads||[]).reduce((s2,l)=>s2+(parseFloat(l.rate)||0),0),0).toLocaleString(),color:"#059669"}].map((statItem)=>{const {label,value,color}=statItem;return(<div key={label} style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:"10px",padding:"16px",textAlign:"center"}}><div style={{fontSize:"11px",color:"#64748b",fontWeight:"600",marginBottom:"6px"}}>{label}</div><div style={{fontSize:"22px",fontWeight:"800",color}}>{value}</div></div>);})</div><div style={{marginTop:"20px"}}><table style={{borderCollapse:"collapse",width:"100%"}}><thead><tr>{["Week","Trailers","Loads","Gross"].map(h=><th key={h} style={{padding:"8px",background:"#1a2e50",color:"#fff",fontSize:"11px",fontWeight:"600",textAlign:"left"}}>{h}</th>)}</tr></thead><tbody>{weeks.map((w,i)=>{const grps=w.groups||[];const loads=grps.flatMap(g=>g.loads||[]);const gross=loads.reduce((s,l)=>s+(parseFloat(l.rate)||0),0);return(<tr key={w.id} style={{background:i%2===0?"#fff":"#f8fafc",borderBottom:"0.5px solid #e2e8f0"}}><td style={{padding:"8px",fontSize:"12px",fontWeight:"600",color:"#1a2e50"}}>{w.label}</td><td style={{padding:"8px",fontSize:"12px"}}>{grps.length}</td><td style={{padding:"8px",fontSize:"12px"}}>{loads.length}</td><td style={{padding:"8px",fontSize:"12px",fontWeight:"700",color:"#059669"}}>${gross.toLocaleString()}</td></tr>);})}</tbody></table></div></div>)}

  </div>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);

</script>
</body>
</html>
